version: '3.8'

# Dev compose: source files are bind-mounted from the host so changes are reflected immediately.
# node_modules come from the image (named volumes override the bind mount at those paths).
#
# Frontend: Vite dev server with HMR — changes to user-interface/ are instant.
# Backend:  Azure Functions — needs `docker compose restart backend` after source changes.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.dev.yml restart backend

services:
  frontend:
    build:
      context: .
      dockerfile: user-interface/Dockerfile.dev
    container_name: cams-frontend-dev
    ports:
      - "3000:5173"
    volumes:
      # Bind-mount the entire repo so workspace module resolution works
      - .:/app
      # Named volumes prevent the host node_modules from shadowing the image's installed deps
      - frontend_root_modules:/app/node_modules
      - frontend_ui_modules:/app/user-interface/node_modules
      - frontend_common_modules:/app/common/node_modules
    env_file:
      - user-interface/.env
    command: sh -c "cd user-interface && node envToConfig.js && npx vite --host 0.0.0.0 --port 5173"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: cams-backend-dev
    ports:
      - "7071:7071"
    volumes:
      # Bind-mount the entire repo so workspace module resolution works
      - .:/app
      # Named volumes prevent the host node_modules from shadowing the image's installed deps
      - backend_root_modules:/app/node_modules
      - backend_backend_modules:/app/backend/node_modules
      - backend_common_modules:/app/common/node_modules
    env_file:
      - backend/.env
    command: >
      sh -c "npm run build:common &&
             cd backend/function-apps/api &&
             npm run build &&
             cp ../../.env . 2>/dev/null || true &&
             cp ../../../dev-users.json . 2>/dev/null || true &&
             printf '{\"IsEncrypted\":false,\"Values\":{\"FUNCTIONS_WORKER_RUNTIME\":\"node\",\"AzureWebJobsStorage\":\"\"},\"ConnectionStrings\":{},\"Host\":{\"CORS\":\"*\"}}' > local.settings.json &&
             func start --javascript --host 0.0.0.0 --port 7071"

volumes:
  frontend_root_modules:
  frontend_ui_modules:
  frontend_common_modules:
  backend_root_modules:
  backend_backend_modules:
  backend_common_modules:
