<!DOCTYPE html>
<html>
<head>
    <title>Rich Text Editor Error Reproduction</title>
</head>
<body>
    <div id="test-container">
        <div contentEditable="true" id="editor-content">
            <p>Hello world</p>
        </div>
    </div>
    
    <script>
        // Simulate the error scenario
        console.log('Testing Rich Text Editor error reproduction...');
        
        // This simulates what happens when the Editor tries to traverse a null DOM element
        function traverseDOM(element) {
            // This is the problematic line - accessing nodeType on potentially null element
            if (element.nodeType === Node.ELEMENT_NODE) {
                console.log('Element found');
            }
        }
        
        // Test with null element (this should cause the error)
        try {
            traverseDOM(null);
        } catch (error) {
            console.error('Error reproduced:', error.message);
        }
        
        // Test with valid element (this should work)
        try {
            const validElement = document.getElementById('editor-content');
            traverseDOM(validElement);
        } catch (error) {
            console.error('Unexpected error:', error.message);
        }
    </script>
</body>
</html>
