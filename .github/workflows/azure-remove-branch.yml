name: Clean up Flexion Azure Resources

on:
  delete:
  workflow_dispatch:
    inputs:
      hashId:
        description: 'Hash id of target branch deployment'
        default: ''
        type: string

permissions: read-all

jobs:
  list:
    runs-on: ubuntu-latest
    environment: 'remove-branch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}
      - name: List existing branch deployments
        run: |
          echo "List Azure resource groups of current branch deployment"
          az group list --query "[?tags.branchName].{ Name:name Branch:tags.branchName HashId:tags.branchHashId }" -o table

  check:
    runs-on: ubuntu-latest
    if: ${{ inputs.hashId != ''  || github.event.ref_type == 'branch' }}
    environment: 'remove-branch'
    permissions:
      contents: read
      id-token: write
    outputs:
      executeCleanup: ${{ steps.check.outputs.executeCleanup }}
      targetBranchHashId: ${{ steps.check.outputs.targetBranchHashId }}
      stackName: ${{ steps.check.outputs.stackName }}
    steps:
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Generate Target Branch Hash
        id: hash
        if: ${{ github.event.ref_type == 'branch' }}
        env:
          GITHUB_EVENT_REF: ${{ github.event.ref }}
        run: |

          branchRef="${GITHUB_EVENT_REF}"
          hash=$(echo -n "${branchRef}" | openssl sha256 | awk '{print $2}')
          shortHash="${hash:0:6}"
          echo "hashId=$shortHash" >> $GITHUB_OUTPUT

      - name: Validate resources
        id: check
        env:
          HASH_ID_OVERRIDE: ${{ inputs.hashId }}
          STEP_HASH_ID: ${{ steps.hash.outputs.hashId }}
          APP_NAME: ${{ vars.APP_NAME }}
          DEV_SUFFIX: ${{ vars.DEV_SUFFIX }}
        run: |
          target="${HASH_ID_OVERRIDE:-${STEP_HASH_ID}}"
          echo "targetBranchHashId=$target" >> $GITHUB_OUTPUT

          echo "Do resources with $target exist?"
          count=$(az group list --query "length([?id.contains(@,'$target')])")
          if [[ $count -eq 2 ]]; then
            echo 'Expected resources found.'
            echo "executeCleanup=true" >> $GITHUB_OUTPUT
          else
            echo 'Did not find existing Azure resources with matching hash id.'
            echo "executeCleanup=false" >> $GITHUB_OUTPUT
          fi

          # Generate base stack name (without hash) for resource naming
          stackName=$(ops/scripts/pipeline/generate-stackname.sh Develop "${APP_NAME}" "${DEV_SUFFIX}" "")
          echo "Stack Name (base): $stackName"
          echo "stackName=$stackName" >> $GITHUB_OUTPUT

  clean-up:
    runs-on: ubuntu-latest
    needs: [check]
    if: needs.check.outputs.executeCleanup == 'true'
    environment: 'remove-branch'
    permissions:
      contents: read
      id-token: write
    env:
      environment: 'Develop'

    steps:
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}
      - name: Fetch config from Key Vault
        env:
          GHA_ENVIRONMENT: 'Develop'
        run: |
          set -euo pipefail
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            KV="kv-ustp-cams"
          else
            KV="kv-ustp-cams-dev"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-COSMOS-MONGO-ACCOUNT-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_COSMOS_MONGO_ACCOUNT_NAME=${_val}" >> "$GITHUB_ENV"

          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-APP-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_APP_RG_BASE=${_val}" >> "$GITHUB_ENV"

          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-NETWORK-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_NETWORK_RG_BASE=${_val}" >> "$GITHUB_ENV"

          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-ANALYTICS-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_ANALYTICS_RG=${_val}" >> "$GITHUB_ENV"

          _val=$(az keyvault secret show --vault-name "$KV" --name AZURE-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZURE_RG=${_val}" >> "$GITHUB_ENV"
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Delete Branch Resources
        uses: azure/cli@9eb25b8360668fb0ecbafa808d40e2197b2f5f52 # v3.0.0
        id: deleteBranchResources
        env:
          AZ_SQL_SERVER_NAME: ${{ secrets.AZ_SQL_SERVER_NAME }}
          STACK_NAME: ${{ needs.check.outputs.stackName }}
          SHORT_HASH: ${{ needs.check.outputs.targetBranchHashId }}
        with:
          azcliversion: 2.62.0
          inlineScript: |
            export AZURE_CORE_USE_MSAL_HTTP_CACHE="${{ vars.AZURE_CORE_USE_MSAL_HTTP_CACHE || 'false' }}"
            ./ops/scripts/utility/az-delete-branch-resources.sh \
            --app-resource-group="${AZ_APP_RG_BASE}" \
            --db-account="${AZ_COSMOS_MONGO_ACCOUNT_NAME}" \
            --db-resource-group="${AZURE_RG}" \
            --sql-server-name="${AZ_SQL_SERVER_NAME}" \
            --sql-resource-group="${AZURE_RG}" \
            --network-resource-group="${AZ_NETWORK_RG_BASE}" \
            --analytics-resource-group="${AZ_ANALYTICS_RG}" \
            --stack-name="${STACK_NAME}" \
            --short-hash="${SHORT_HASH}"
