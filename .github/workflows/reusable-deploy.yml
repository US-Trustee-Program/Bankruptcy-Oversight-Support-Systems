name: Azure Deployment - Infrastructure

on:
  workflow_call:
    inputs:
      ghaEnvironment:
        required: true
        type: string
      stackName:
        required: true
        type: string
      environmentHash:
        required: true
        type: string
      deployVnet:
        required: true
        type: string
    secrets:
      AZ_CLIENT_ID:
        required: true
      AZ_TENANT_ID:
        required: true
      AZ_SUBSCRIPTION_ID:
        required: true
      AZURE_SUBSCRIPTION:
        required: true
      AZ_LOCATION:
        required: true
      USTP_ISSUE_COLLECTOR_HASH:
        required: true
      AZ_SQL_SERVER_NAME:
        required: true
      AZ_SQL_IDENTITY_NAME:
        required: true
      AZ_ACTION_GROUP_NAME:
        required: true

permissions:
  contents: read

jobs:
  deploy-azure-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-main' || 'deploy-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@f548e57e544e1ff5a4c46bf1e1b8685f8e4a348a # main

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Fetch config from Key Vault
        env:
          GHA_ENVIRONMENT: ${{ inputs.ghaEnvironment }}
          ENVIRONMENT_HASH: ${{ inputs.environmentHash }}
        run: |
          set -euo pipefail
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            KV="kv-ustp-cams"
          else
            KV="kv-ustp-cams-dev"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-APP-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          AZ_APP_RG_BASE="${_val}"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-NETWORK-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          AZ_NETWORK_RG_BASE="${_val}"
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            AZ_APP_RG="${AZ_APP_RG_BASE}"
            AZ_NETWORK_RG="${AZ_NETWORK_RG_BASE}"
          else
            AZ_APP_RG="${AZ_APP_RG_BASE}-${ENVIRONMENT_HASH}"
            AZ_NETWORK_RG="${AZ_NETWORK_RG_BASE}-${ENVIRONMENT_HASH}"
          fi
          echo "AZ_APP_RG=${AZ_APP_RG}" >> "$GITHUB_ENV"
          echo "AZ_NETWORK_RG=${AZ_NETWORK_RG}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZURE-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZURE_RG=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-ANALYTICS-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_ANALYTICS_RG=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-KV-APP-CONFIG-MANAGED-ID --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_KV_APP_CONFIG_MANAGED_ID=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-KV-APP-CONFIG-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_KV_APP_CONFIG_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-COSMOS-DATABASE-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_COSMOS_DATABASE_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-ANALYTICS-WORKSPACE-ID --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_ANALYTICS_WORKSPACE_ID=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name SLOT-NAME --query value -o tsv 2>/dev/null || true)
          if [[ -n "${_val}" ]]; then echo "::add-mask::${_val}"; fi
          echo "SLOT_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-NETWORK-VNET-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_NETWORK_VNET_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-PLAN-TYPE --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_PLAN_TYPE=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name CAMS-LOGIN-PROVIDER --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "CAMS_LOGIN_PROVIDER=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name CAMS-ENABLED-DATAFLOWS --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "CAMS_ENABLED_DATAFLOWS=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name MSSQL-REQUEST-TIMEOUT --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "MSSQL_REQUEST_TIMEOUT=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name MIGRATE-CASE-APPOINTMENTS-FETCH-SIZE --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "MIGRATE_CASE_APPOINTMENTS_FETCH_SIZE=${_val}" >> "$GITHUB_ENV"

      - name: Create Azure resource groups
        id: azure-resource-group
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          ENVIRONMENT_HASH: ${{ inputs.environmentHash }}
          IS_BRANCH_DEPLOYMENT: ${{ github.ref != 'refs/heads/main' && 'true' || 'false' }}
          AZURE_SUBSCRIPTION: ${{ secrets.AZURE_SUBSCRIPTION }} # pragma: allowlist secret
          AZ_LOCATION: ${{ secrets.AZ_LOCATION }} # pragma: allowlist secret
        run: |
          ./ops/scripts/pipeline/azure-deploy-rg.sh \
            --show-what-if \
            --file ./ops/cloud-deployment/lib/subscription/ustp-cams-rg.bicep \
            --parameters "databaseResourceGroupName=${AZURE_RG} networkResourceGroupName=${{ env.AZ_NETWORK_RG }} webappResourceGroupName=${{ env.AZ_APP_RG }} analyticsResourceGroupName=${AZ_ANALYTICS_RG} azSubscription=${AZURE_SUBSCRIPTION} branchName=${BRANCH_NAME} branchHashId=${ENVIRONMENT_HASH} isBranchDeployment=${IS_BRANCH_DEPLOYMENT}" \
            -l "${AZ_LOCATION}"

      - name: Deploy Branch Log Analytics Workspace
        id: branch-law
        if: ${{ inputs.ghaEnvironment != 'Main-Gov' }}
        env:
          STACK_NAME: ${{ inputs.stackName }}
          AZ_LOCATION: ${{ secrets.AZ_LOCATION }} # pragma: allowlist secret
        run: |
          set -euo pipefail

          branchWorkspaceName="law-${STACK_NAME}"
          echo "Creating branch-specific Log Analytics Workspace: ${branchWorkspaceName}"

          # Deploy LAW using existing template (includes 1GB daily cap for cost control)
          az deployment group create \
            --resource-group "${AZ_ANALYTICS_RG}" \
            --template-file ./ops/cloud-deployment/lib/analytics/log-analytics-workspace.bicep \
            --parameters workspaceName="${branchWorkspaceName}" \
                         location="${AZ_LOCATION}"

          # Get workspace ID for downstream use
          workspaceId=$(az monitor log-analytics workspace show \
            --resource-group "${AZ_ANALYTICS_RG}" \
            --workspace-name "${branchWorkspaceName}" \
            --query id --output tsv)
          echo "Branch LAW created with ID: ${workspaceId}"
          echo "workspaceId=${workspaceId}" >> $GITHUB_OUTPUT

      - name: Determine Analytics Workspace ID
        id: analytics-workspace
        env:
          GHA_ENVIRONMENT: ${{ inputs.ghaEnvironment }}
        run: |
          if [[ "${GHA_ENVIRONMENT}" != "Main-Gov" ]]; then
            echo "Using branch-specific workspace"
            echo "workspaceId=${{ steps.branch-law.outputs.workspaceId }}" >> $GITHUB_OUTPUT
          else
            echo "Using shared workspace"
            echo "workspaceId=${{ env.AZ_ANALYTICS_WORKSPACE_ID }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Azure network resources
        id: azure-network-deploy
        env:
          STACK_NAME: ${{ inputs.stackName }}
          BRANCH_NAME: ${{ github.ref_name }}
          ENVIRONMENT_HASH: ${{ inputs.environmentHash }}
          IS_BRANCH_DEPLOYMENT: ${{ github.ref != 'refs/heads/main' && 'true' || 'false' }}
          DEPLOY_VNET: ${{ inputs.deployVnet }}
          AZ_LOCATION: ${{ secrets.AZ_LOCATION }} # pragma: allowlist secret
        run: |
          ./ops/scripts/pipeline/azure-deploy-network.sh \
            --file ./ops/cloud-deployment/network.bicep \
            --stackName "${STACK_NAME}" \
            --networkResourceGroupName ${{ env.AZ_NETWORK_RG }} \
            --virtualNetworkName ${{ env.AZ_NETWORK_VNET_NAME }} \
            --deployVnet "${DEPLOY_VNET}" \
            --isBranchDeployment "${IS_BRANCH_DEPLOYMENT}" \
            --branchName "${BRANCH_NAME}" \
            --branchHashId "${ENVIRONMENT_HASH}" \
            -l "${AZ_LOCATION}"

      - name: Deploy Azure resources
        id: azure-deploy
        env:
          STACK_NAME: ${{ inputs.stackName }}
          ENVIRONMENT_HASH: ${{ inputs.environmentHash }}
          DEPLOY_VNET: ${{ inputs.deployVnet }}
          CREATE_ALERTS: ${{ inputs.ghaEnvironment == 'Main-Gov' }}
          LOGIN_PROVIDER_CONFIG: ${{ vars.CAMS_LOGIN_PROVIDER_CONFIG }}
          OKTA_URL: ${{ vars.OKTA_URL }}
          MAX_OBJECT_DEPTH: ${{ vars.MAX_OBJECT_DEPTH }}
          MAX_OBJECT_KEY_COUNT: ${{ vars.MAX_OBJECT_KEY_COUNT }}
          GIT_SHA: ${{ github.sha }}
          USTP_ISSUE_COLLECTOR_HASH: ${{ secrets.USTP_ISSUE_COLLECTOR_HASH }} # pragma: allowlist secret
          AZ_SQL_SERVER_NAME: ${{ secrets.AZ_SQL_SERVER_NAME }} # pragma: allowlist secret
          AZ_SQL_IDENTITY_NAME: ${{ secrets.AZ_SQL_IDENTITY_NAME }} # pragma: allowlist secret
          AZ_ACTION_GROUP_NAME: ${{ secrets.AZ_ACTION_GROUP_NAME }} # pragma: allowlist secret
        run: |
          e2eDatabaseSuffix="${ENVIRONMENT_HASH:+-${ENVIRONMENT_HASH}}"
          ./ops/scripts/pipeline/azure-deploy.sh \
            --resource-group ${{ env.AZ_APP_RG }} \
            --file ./ops/cloud-deployment/main.bicep \
            --stackName "${STACK_NAME}" \
            --slotName ${{ env.SLOT_NAME }} \
            --networkResourceGroupName ${{ env.AZ_NETWORK_RG }} \
            --virtualNetworkName ${{ env.AZ_NETWORK_VNET_NAME }} \
            --analyticsResourceGroupName "${AZ_ANALYTICS_RG}" \
            --idKeyvaultAppConfiguration ${{ env.AZ_KV_APP_CONFIG_MANAGED_ID }} \
            --kvAppConfigResourceGroupName "${AZURE_RG}" \
            --kvAppConfigName ${{ env.AZ_KV_APP_CONFIG_NAME }} \
            --cosmosDatabaseName ${{ env.AZ_COSMOS_DATABASE_NAME }} \
            --e2eDatabaseName "${{ env.AZ_COSMOS_DATABASE_NAME }}-e2e${e2eDatabaseSuffix}" \
            --e2eSqlDatabaseName "CAMS_E2E${e2eDatabaseSuffix}" \
            --deployVnet "${DEPLOY_VNET}" \
            --ustpIssueCollectorHash "${USTP_ISSUE_COLLECTOR_HASH}" \
            --createAlerts "${CREATE_ALERTS}" \
            --deployAppInsights true \
            --analyticsWorkspaceId ${{ steps.analytics-workspace.outputs.workspaceId }} \
            --webappPlanType ${{ env.AZ_PLAN_TYPE }} \
            --loginProvider ${{ env.CAMS_LOGIN_PROVIDER }} \
            --loginProviderConfig "${LOGIN_PROVIDER_CONFIG}" \
            --sqlServerName "${AZ_SQL_SERVER_NAME}" \
            --sqlServerResourceGroupName "${AZURE_RG}" \
            --sqlServerIdentityName "${AZ_SQL_IDENTITY_NAME}" \
            --actionGroupName "${AZ_ACTION_GROUP_NAME}" \
            --oktaUrl "${OKTA_URL}" \
            --mssqlRequestTimeout ${{ env.MSSQL_REQUEST_TIMEOUT }} \
            --enabledDataflows ${{ env.CAMS_ENABLED_DATAFLOWS }} \
            --migrateCaseAppointmentsFetchSize ${{ env.MIGRATE_CASE_APPOINTMENTS_FETCH_SIZE }} \
            --maxObjectDepth "${MAX_OBJECT_DEPTH}" \
            --maxObjectKeyCount "${MAX_OBJECT_KEY_COUNT}" \
            --gitSha "${GIT_SHA}"
