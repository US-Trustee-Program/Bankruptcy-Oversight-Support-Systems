name: Azure Deployment - Infrastructure

on:
  workflow_call:
    inputs:
      ghaEnvironment:
        required: true
        type: string
      azResourceGrpAppEncrypted:
        required: true
        type: string
      azResourceGrpNetworkEncrypted:
        required: true
        type: string
      stackName:
        required: true
        type: string
      environmentHash:
        required: true
        type: string
      deployVnet:
        required: true
        type: string
      deployBranch:
        default: 'false'
        type: string
      deployBicep:
        required: true
        type: string
    outputs:
      deployment_outputs:
        description: "JSON string containing all deployment outputs"
        value: ${{ jobs.deploy-azure-infrastructure.outputs.deployment_outputs }}
      webapp_api_version:
        description: "API version of the webapp"
        value: ${{ jobs.deploy-azure-infrastructure.outputs.webapp_api_version }}
      api_function_app_api_version:
        description: "API version of the API function app"
        value: ${{ jobs.deploy-azure-infrastructure.outputs.api_function_app_api_version }}
      dataflows_function_app_api_version:
        description: "API version of the dataflows function app"
        value: ${{ jobs.deploy-azure-infrastructure.outputs.dataflows_function_app_api_version }}

jobs:
  deploy-azure-infrastructure:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment }}
    outputs:
      deployment_outputs: ${{ steps.parse-outputs.outputs.deployment_outputs }}
      webapp_api_version: ${{ steps.parse-outputs.outputs.WEBAPP_API_VERSION }}
      api_function_app_api_version: ${{ steps.parse-outputs.outputs.API_FUNCTION_APP_API_VERSION }}
      dataflows_function_app_api_version: ${{ steps.parse-outputs.outputs.DATAFLOWS_FUNCTION_APP_API_VERSION }}
    steps:
      - uses: actions/checkout@main

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - uses: cloudposse/github-action-secret-outputs@main
        id: rgApp
        with:
          secret: ${{ secrets.PGP_SIGNING_PASSPHRASE }}
          op: decode
          in: ${{ inputs.azResourceGrpAppEncrypted }}

      - uses: cloudposse/github-action-secret-outputs@main
        id: rgNetwork
        with:
          secret: ${{ secrets.PGP_SIGNING_PASSPHRASE }}
          op: decode
          in: ${{ inputs.azResourceGrpNetworkEncrypted }}

      - name: Create Azure resource groups
        id: azure-resource-group
        if: inputs.deployBicep == 'true'
        run: |
          ./ops/scripts/pipeline/azure-deploy-rg.sh \
            --show-what-if \
            --file ./ops/cloud-deployment/lib/subscription/ustp-cams-rg.bicep \
            --parameters 'databaseResourceGroupName=${{ secrets.AZURE_RG }} networkResourceGroupName=${{ steps.rgNetwork.outputs.out }} webappResourceGroupName=${{ steps.rgApp.outputs.out }} azSubscription=${{ secrets.AZURE_SUBSCRIPTION }} branchName=${{ github.ref_name }} branchHashId=${{ inputs.environmentHash }} isBranchDeployment=${{ inputs.deployBranch }}' \
            -l ${{ secrets.AZ_LOCATION }}

      - name: Deploy Azure resources
        id: azure-deploy
        if: inputs.deployBicep == 'true'
        run: |
          ./ops/scripts/pipeline/azure-deploy.sh \
            --resource-group ${{ steps.rgApp.outputs.out }} \
            --file ./ops/cloud-deployment/main.bicep \
            --stackName ${{ inputs.stackName }} \
            --networkResourceGroupName ${{ steps.rgNetwork.outputs.out }} \
            --virtualNetworkName ${{ vars.AZ_NETWORK_VNET_NAME }} \
            --analyticsWorkspaceId ${{ secrets.AZ_ANALYTICS_WORKSPACE_ID }}  \
            --idKeyvaultAppConfiguration ${{ secrets.AZ_KV_APP_CONFIG_MANAGED_ID }}  \
            --kvAppConfigResourceGroupName ${{secrets.AZURE_RG }} \
            --kvAppConfigName ${{ secrets.AZ_KV_APP_CONFIG_NAME }} \
            --cosmosDatabaseName ${{ secrets.AZ_COSMOS_DATABASE_NAME }} \
            --deployVnet ${{ inputs.deployVnet }} \
            --camsReactSelectHash ${{ secrets.CAMS_REACT_SELECT_HASH }} \
            --ustpIssueCollectorHash ${{ secrets.USTP_ISSUE_COLLECTOR_HASH }} \
            --createAlerts ${{ inputs.ghaEnvironment == 'Main-Gov' }} \
            --deployAppInsights true \
            --webappPlanType ${{ vars.AZ_PLAN_TYPE }} \
            --loginProvider ${{ vars.CAMS_LOGIN_PROVIDER }} \
            --loginProviderConfig '${{ vars.CAMS_LOGIN_PROVIDER_CONFIG }}' \
            --sqlServerName ${{ secrets.AZ_SQL_SERVER_NAME }} \
            --sqlServerResourceGroupName ${{ secrets.AZURE_RG }} \
            --sqlServerIdentityName ${{ secrets.AZ_SQL_IDENTITY_NAME }} \
            --actionGroupName ${{ secrets.AZ_ACTION_GROUP_NAME }} \
            --oktaUrl '${{ vars.OKTA_URL }}' \
            --mssqlRequestTimeout ${{ vars.MSSQL_REQUEST_TIMEOUT }} \
            --enabledDataflows ${{ vars.CAMS_ENABLED_DATAFLOWS }} \
            --maxObjectDepth ${{ vars.MAX_OBJECT_DEPTH }} \
            --maxObjectKeyCount ${{ vars.MAX_OBJECT_KEY_COUNT }}

      - name: Parse deployment outputs
        id: parse-outputs
        if: inputs.deployBicep == 'true'
        run: |
          if [ -f outputs.json ]; then
            echo "deployment_outputs=$(cat outputs.json | jq -c .)" >> $GITHUB_OUTPUT

            # Extract specific API versions from deployment outputs
            export WEBAPP_API_VERSION=$(jq -r '.webappApiVersion.value // empty' outputs.json)
            export API_FUNCTION_APP_API_VERSION=$(jq -r '.apiFunctionAppApiVersion.value // empty' outputs.json)
            export DATAFLOWS_FUNCTION_APP_API_VERSION=$(jq -r '.dataflowsFunctionAppApiVersion.value // empty' outputs.json)
            echo "WEBAPP_API_VERSION=$WEBAPP_API_VERSION"
            echo "API_FUNCTION_APP_API_VERSION=$API_FUNCTION_APP_API_VERSION"
            echo "DATAFLOWS_FUNCTION_APP_API_VERSION=$DATAFLOWS_FUNCTION_APP_API_VERSION"

            # Make API versions available as job outputs
            echo "WEBAPP_API_VERSION=$WEBAPP_API_VERSION" >> $GITHUB_OUTPUT
            echo "API_FUNCTION_APP_API_VERSION=$API_FUNCTION_APP_API_VERSION" >> $GITHUB_OUTPUT
            echo "DATAFLOWS_FUNCTION_APP_API_VERSION=$DATAFLOWS_FUNCTION_APP_API_VERSION" >> $GITHUB_OUTPUT
          else
            echo "deployment_outputs={}" >> $GITHUB_OUTPUT
            echo "WEBAPP_API_VERSION=" >> $GITHUB_OUTPUT
            echo "API_FUNCTION_APP_API_VERSION=" >> $GITHUB_OUTPUT
            echo "DATAFLOWS_FUNCTION_APP_API_VERSION=" >> $GITHUB_OUTPUT
          fi
