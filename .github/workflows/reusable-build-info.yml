name: Build Info

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      branchNameOverride:
        required: false
        type: string
        description: 'Override branch name for resource naming (use for PR validation)'
    outputs:
      stackName:
        description: 'Application name'
        value: ${{ jobs.build-info.outputs.stackName }}
      webappName:
        description: 'Expected Web Application name [used for Azure Resource]'
        value: ${{ jobs.build-info.outputs.webappName }}
      apiFunctionName:
        description: ''
        value: ${{ jobs.build-info.outputs.apiFunctionName }}
      azResourceGrpApp:
        description: ''
        value: ${{ jobs.build-info.outputs.azResourceGrpApp }}
      azResourceGrpNetwork:
        description: ''
        value: ${{ jobs.build-info.outputs.azResourceGrpNetwork }}
      environmentHash:
        description: ''
        value: ${{ jobs.build-info.outputs.environmentHash }}
      dataflowsFunctionName:
        description: ''
        value: ${{ jobs.build-info.outputs.dataflowsFunctionName }}
      slotName:
        description: ''
        value: ${{ jobs.build-info.outputs.slotName }}
      deployVnet:
        description: ''
        value: ${{ jobs.build-info.outputs.deployVnet }}
      initialDeployment:
        description: ''
        value: ${{ jobs.build-info.outputs.initialDeployment }}
      ghaEnvironment:
        description: ''
        value: ${{ inputs.environment }}

jobs:
  build-info:
    name: Run Info
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'Main-Gov' && 'build-info-main' || 'build-info-branch' }}
    permissions:
      contents: read
      id-token: write
    outputs:
      stackName: ${{ steps.build-info.outputs.stackName }}
      webappName: ${{ steps.build-info.outputs.webappName }}
      apiFunctionName: ${{ steps.build-info.outputs.apiFunctionName }}
      dataflowsFunctionName: ${{ steps.build-info.outputs.dataflowsFunctionName }}
      azResourceGrpApp: ${{ steps.build-info.outputs.azResourceGrpApp }}
      azResourceGrpNetwork: ${{ steps.build-info.outputs.azResourceGrpNetwork }}
      environmentHash: ${{ steps.check-env.outputs.environmentHash }}
      slotName: ${{ steps.build-info.outputs.slotName }}
      deployVnet: ${{ steps.check-deployment.outputs.deployVnet }}
      initialDeployment: ${{ steps.check-deployment.outputs.initialDeployment }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Check environment
        id: check-env
        if: ${{ inputs.environment != 'Main-Gov' }} # Generate deterministic hash to append to resource group names
        run: |
          # Use branchNameOverride if provided (for PR validation), otherwise use current branch
          branchName="${{ inputs.branchNameOverride || github.ref_name }}"
          echo "Using branch name for hash: ${branchName}"
          hash=$(echo -n "${branchName}" | openssl sha256 | awk '{print $2}')
          shortHash="${hash:0:6}"
          echo "environmentHash=${shortHash}" >> $GITHUB_OUTPUT
          echo "resourceGroupSuffix=-${shortHash}" >> $GITHUB_OUTPUT
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}
      - name: Fetch config from Key Vault
        run: |
          set -euo pipefail
          if [[ "${{ inputs.environment }}" == "Main-Gov" ]]; then
            KV="kv-ustp-cams"
          else
            KV="kv-ustp-cams-dev"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-APP-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_APP_RG=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-NETWORK-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_NETWORK_RG=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-NETWORK-VNET-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_NETWORK_VNET_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name SLOT-NAME --query value -o tsv 2>/dev/null || true)
          if [[ -n "${_val}" ]]; then echo "::add-mask::${_val}"; fi
          echo "SLOT_NAME=${_val}" >> "$GITHUB_ENV"
      - name: Print build info
        id: build-info
        run: |
          echo "Printing build info"
          echo "Azure Plan Type: ${{ vars.AZ_PLAN_TYPE }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Target Azure Cloud: ${{ vars.AZURE_ENVIRONMENT }}"
          echo "Git SHA: ${{ github.sha }}"


          # Generate resource group name(s)
          echo "Env Hash: ${{ steps.check-env.outputs.environmentHash }}"
          resourceGroupSuffix=${{ steps.check-env.outputs.resourceGroupSuffix || '' }}
          echo "Resource group appended with the following: ${resourceGroupSuffix}"

          # Stack name used downstream to label build artifacts and Azure resources
          # Use branchNameOverride if provided (for PR validation), otherwise use current branch
          branchName="${{ inputs.branchNameOverride || github.ref_name }}"
          stackName=$(ops/scripts/pipeline/generate-stackname.sh ${{ inputs.environment }} ${{ vars.APP_NAME }} ${{ vars.DEV_SUFFIX }} "${branchName}")
          echo "Stack Name: $stackName"
          webappName="${stackName}-webapp"
          echo "Webapp Name: $webappName"
          apiFunctionName="${stackName}-node-api"
          echo "Api Function Name: $apiFunctionName"
          dataflowsFunctionName="${stackName}-dataflows"
          echo "Data Flows Function Name: $dataflowsFunctionName"

          # Expected job output values
          echo "azResourceGrpApp=${{ env.AZ_APP_RG }}${resourceGroupSuffix}" >> $GITHUB_OUTPUT
          echo "azResourceGrpNetwork=${{ env.AZ_NETWORK_RG }}${resourceGroupSuffix}" >> $GITHUB_OUTPUT
          echo "stackName=${stackName}" >> $GITHUB_OUTPUT
          echo "webappName=${webappName}" >> $GITHUB_OUTPUT
          echo "apiFunctionName=${apiFunctionName}" >> $GITHUB_OUTPUT
          echo "dataflowsFunctionName=${dataflowsFunctionName}" >> $GITHUB_OUTPUT
          echo "slotName=${{ env.SLOT_NAME }}" >> $GITHUB_OUTPUT

      - name: Check Vnet && Initial Deployment
        id: check-deployment
        run: |
          initialDeployment=$(./ops/scripts/pipeline/check-for-environment.sh --resource-group ${{ steps.build-info.outputs.azResourceGrpApp }} --webappName ${{ steps.build-info.outputs.webappName }} --apiName ${{ steps.build-info.outputs.apiFunctionName }})
          echo "initialDeployment=${initialDeployment}" >> $GITHUB_OUTPUT
          echo "Initial Deployment: ${initialDeployment}"

          deployVnet=$(./ops/scripts/pipeline/check-for-network.sh --resource-group ${{ steps.build-info.outputs.azResourceGrpNetwork }} --vnet-name "${{ env.AZ_NETWORK_VNET_NAME }}" --is-initial-deployment "${initialDeployment}")
          echo "deployVnet=${deployVnet}" >> $GITHUB_OUTPUT
          echo "Deploy Vnet: ${deployVnet}"
