name: Migrate GitHub Secrets to Key Vault

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub environment to migrate (Develop or Main-Gov)'
        required: true
        type: choice
        options:
          - Develop
          - Main-Gov

permissions: read-all

jobs:
  migrate:
    name: Write secrets to Key Vault
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Set Key Vault name
        id: kv
        run: |
          if [[ "${{ inputs.environment }}" == "Main-Gov" ]]; then
            echo "name=kv-ustp-cams" >> "$GITHUB_OUTPUT"
          else
            echo "name=kv-ustp-cams-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Write secrets
        run: |
          KV="${{ steps.kv.outputs.name }}"
          az keyvault secret set --vault-name "$KV" --name AZ-APP-RG                  --value "${{ secrets.AZ_APP_RG }}"                  --output none
          az keyvault secret set --vault-name "$KV" --name AZ-NETWORK-RG              --value "${{ secrets.AZ_NETWORK_RG }}"              --output none
          az keyvault secret set --vault-name "$KV" --name AZ-ANALYTICS-WORKSPACE-ID  --value "${{ secrets.AZ_ANALYTICS_WORKSPACE_ID }}"  --output none
          az keyvault secret set --vault-name "$KV" --name AZ-ANALYTICS-WORKSPACE-NAME --value "${{ secrets.AZ_ANALYTICS_WORKSPACE_NAME }}" --output none
          az keyvault secret set --vault-name "$KV" --name AZ-COSMOS-DATABASE-NAME    --value "${{ secrets.AZ_COSMOS_DATABASE_NAME }}"    --output none
          az keyvault secret set --vault-name "$KV" --name AZ-COSMOS-MONGO-ACCOUNT-NAME --value "${{ secrets.AZ_COSMOS_MONGO_ACCOUNT_NAME }}" --output none
          az keyvault secret set --vault-name "$KV" --name AZ-COSMOS-ID-NAME          --value "${{ secrets.AZ_COSMOS_ID_NAME }}"          --output none
          az keyvault secret set --vault-name "$KV" --name AZ-KV-APP-CONFIG-MANAGED-ID --value "${{ secrets.AZ_KV_APP_CONFIG_MANAGED_ID }}" --output none
          az keyvault secret set --vault-name "$KV" --name AZ-KV-APP-CONFIG-NAME      --value "${{ secrets.AZ_KV_APP_CONFIG_NAME }}"      --output none
          az keyvault secret set --vault-name "$KV" --name AZ-KV-APP-CONFIG-RG-NAME   --value "${{ secrets.AZ_KV_APP_CONFIG_RG_NAME }}"   --output none

      - name: Write variables
        run: |
          KV="${{ steps.kv.outputs.name }}"
          az keyvault secret set --vault-name "$KV" --name AZ-PLAN-TYPE                  --value "${{ vars.AZ_PLAN_TYPE }}"                  --output none
          az keyvault secret set --vault-name "$KV" --name AZ-NETWORK-VNET-NAME          --value "${{ vars.AZ_NETWORK_VNET_NAME }}"          --output none
          az keyvault secret set --vault-name "$KV" --name CAMS-ENABLED-DATAFLOWS        --value "${{ vars.CAMS_ENABLED_DATAFLOWS }}"        --output none
          az keyvault secret set --vault-name "$KV" --name CAMS-LOGIN-PROVIDER           --value "${{ vars.CAMS_LOGIN_PROVIDER }}"           --output none
          az keyvault secret set --vault-name "$KV" --name AZURE-CORE-USE-MSAL-HTTP-CACHE --value "${{ vars.AZURE_CORE_USE_MSAL_HTTP_CACHE }}" --output none
          az keyvault secret set --vault-name "$KV" --name MSSQL-REQUEST-TIMEOUT         --value "${{ vars.MSSQL_REQUEST_TIMEOUT }}"         --output none

      - name: Write Develop-only variables
        if: inputs.environment == 'Develop'
        run: |
          az keyvault secret set --vault-name kv-ustp-cams-dev --name SLOT-NAME --value "${{ vars.SLOT_NAME }}" --output none
