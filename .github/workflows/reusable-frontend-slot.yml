name: Azure Deployment - Frontend Slot Resource Creation

on:
  workflow_call:
    inputs:
      webAppName:
        required: true
        type: string
      apiFunctionName:
        required: true
        type: string
      ghaEnvironment:
        required: true
        type: string
      azResourceGrpAppEncrypted:
        required: true
        type: string
      azResourceGrpNetworkEncrypted:
        required: true
        type: string
      slotName:
        required: true
        type: string
jobs:
  deploy-frontend-slot-resources:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment }}
    steps:
      - uses: actions/checkout@v3
      - uses: cloudposse/github-action-secret-outputs@main
        id: rgApp
        with:
          secret: ${{ secrets.PGP_SIGNING_PASSPHRASE }}
          op: decode
          in: ${{ inputs.azResourceGrpAppEncrypted }}
      - uses: cloudposse/github-action-secret-outputs@main
        id: rgNetwork
        with:
          secret: ${{ secrets.PGP_SIGNING_PASSPHRASE }}
          op: decode
          in: ${{ inputs.azResourceGrpNetworkEncrypted  }}
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}
      - name: Create Webapp Slot Resource
        run: |
          webAppSubnetName="snet-${{ inputs.webAppName }}"

          echo '${{ secrets.AZURE_CREDENTIALS }}' > /tmp/azure-credentials.json

          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v /tmp/azure-credentials.json:/tmp/azure-credentials.json \
            -w /workspace \
            mcr.microsoft.com/azure-cli:2.71.0 \
            bash -c "
              az login --service-principal \
                --username \$(jq -r '.clientId' /tmp/azure-credentials.json) \
                --password \$(jq -r '.clientSecret' /tmp/azure-credentials.json) \
                --tenant \$(jq -r '.tenantId' /tmp/azure-credentials.json) \
                --subscription ${{ secrets.AZURE_SUBSCRIPTION }} && \
              ./ops/scripts/pipeline/slots/az-slot-web-resource-deploy.sh \
                --resourceGroup ${{ steps.rgApp.outputs.out }} \
                --webappName ${{ inputs.webappName }} \
                --apiFunctionName ${{ inputs.apiFunctionName }} \
                --slotName ${{ inputs.slotName }} \
                --subscription ${{ secrets.AZURE_SUBSCRIPTION }} \
                --network-rg ${{ steps.rgNetwork.outputs.out }} \
                --vnet ${{ vars.AZ_NETWORK_VNET_NAME }} \
                --subnet snet-${{ inputs.webAppName }}
            "

          rm -f /tmp/azure-credentials.json
