name: Azure Deployment - Supporting Infrastructure

on:
  workflow_call:
    inputs:
      ghaEnvironment:
        required: true
        type: string
      azResourceGrpNetworkEncrypted:
        required: true
        type: string
      apiFunctionName:
        required: true
        type: string
      dataflowsFunctionName:
        required: true
        type: string
      environmentHash:
        required: true
        type: string
      stackName:
        required: true
        type: string

jobs:
  deploy-log-analytics-workspace:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Deploy Log Analytics Workspace
        id: azure-analytics-deploy
        run: |
          az deployment group create \
            -g ${{ secrets.AZ_ANALYTICS_RG }} \
            -f ./ops/cloud-deployment/lib/analytics/log-analytics-workspace.bicep \
            -p workspaceName=${{ secrets.AZ_ANALYTICS_WORKSPACE_NAME }} \
               location=${{ secrets.AZ_LOCATION }}

  deploy-db:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - uses: cloudposse/github-action-secret-outputs@67ae2f7ee1890986ba0012bacd079a5a36ecb449 # main
        id: rgNetwork
        with:
          secret: ${{ secrets.PGP_SIGNING_PASSPHRASE }}
          op: decode
          in: ${{ inputs.azResourceGrpNetworkEncrypted }}
      - name: Generate E2E name
        id: generateE2eName
        run: |
          e2eDatabaseName="${{ secrets.AZ_COSMOS_DATABASE_NAME }}-e2e"
          if [[ ${{ inputs.ghaEnvironment }} != "Main-Gov" ]]; then
            echo "Adding suffix to database name"
            e2eDatabaseName="${e2eDatabaseName}-${{ inputs.environmentHash }}"
          fi
          echo "e2eDatabaseName=${e2eDatabaseName}" >> $GITHUB_OUTPUT

      - name: Deploy Cosmos MongoDB
        id: azure-mongodb-deploy
        run: |
          allowedNetworks=$(az network vnet subnet list -g ${{ steps.rgNetwork.outputs.out }} --vnet-name ${{ vars.AZ_NETWORK_VNET_NAME }} --query "[?name=='snet-${{ inputs.apiFunctionName }}' || name=='snet-${{inputs.dataflowsFunctionName}}'].id" -o json)

          ./ops/scripts/pipeline/az-cosmos-deploy.sh \
            -g ${{ secrets.AZURE_RG }} \
            --accountName ${{ secrets.AZ_COSMOS_MONGO_ACCOUNT_NAME }} \
            --databaseName ${{ secrets.AZ_COSMOS_DATABASE_NAME }} \
            --environmentName ${{ inputs.ghaEnvironment }} \
            --allowedNetworks "${allowedNetworks}" \
            --analyticsWorkspaceId ${{ secrets.AZ_ANALYTICS_WORKSPACE_ID }} \
            --actionGroupResourceGroup ${{ secrets.AZ_ANALYTICS_RG }} \
            --actionGroupName ${{ secrets.AZ_ACTION_GROUP_NAME }} \
            --keyVaultName ${{ secrets.AZ_KV_APP_CONFIG_NAME }} \
            --kvResourceGroup ${{ secrets.AZ_KV_APP_CONFIG_RG_NAME }} \
            --branchHashId ${{ inputs.environmentHash || 'DOES_NOT_EXIST' }}

      - name: Deploy E2E SQL Database
        id: azure-e2e-sql-deploy
        if: ${{ inputs.environmentHash != '' && inputs.ghaEnvironment != 'Main-Gov' }}
        run: |
          e2eSqlDatabaseName="CAMS_E2E-${{ inputs.environmentHash }}"
          sqlDbExists=$(az sql db show \
            -g ${{ secrets.AZURE_RG }} \
            -s ${{ secrets.AZ_SQL_SERVER_NAME }} \
            -n "${e2eSqlDatabaseName}" \
            --query id -o tsv 2>/dev/null || echo "")
          if [[ -z "${sqlDbExists}" ]]; then
            echo "Creating E2E SQL database ${e2eSqlDatabaseName}"
            az sql db create \
              -g ${{ secrets.AZURE_RG }} \
              -s ${{ secrets.AZ_SQL_SERVER_NAME }} \
              -n "${e2eSqlDatabaseName}" \
              --elastic-pool CAMS-ELASTIC-POOL
          else
            echo "E2E SQL database ${e2eSqlDatabaseName} already exists, skipping"
          fi
          echo "e2eSqlDatabaseName=${e2eSqlDatabaseName}" >> $GITHUB_OUTPUT

      - name: Provision E2E SQL Database user
        if: ${{ inputs.environmentHash != '' && inputs.ghaEnvironment != 'Main-Gov' }}
        run: |
          ./ops/scripts/pipeline/add-sql-firewall-rule.sh \
            -g ${{ secrets.AZURE_RG }} \
            --stack-name ${{ inputs.stackName }} \
            --server-name ${{ secrets.AZ_SQL_SERVER_NAME }}

          curl -sSL https://aka.ms/install-sqlcmd-linux | sudo bash

          sqlToken=$(az account get-access-token \
            --resource "https://database.usgovcloudapi.net/" \
            --query accessToken -o tsv)

          sqlcmd \
            -S "${{ secrets.AZ_SQL_SERVER_NAME }}.database.usgovcloudapi.net" \
            -d "${{ steps.azure-e2e-sql-deploy.outputs.e2eSqlDatabaseName }}" \
            --token "${sqlToken}" \
            -Q "
              IF NOT EXISTS (
                SELECT 1 FROM sys.database_principals
                WHERE name = '${{ secrets.AZ_SQL_IDENTITY_NAME }}'
              )
              BEGIN
                CREATE USER [${{ secrets.AZ_SQL_IDENTITY_NAME }}] FROM EXTERNAL PROVIDER;
                ALTER ROLE db_datareader ADD MEMBER [${{ secrets.AZ_SQL_IDENTITY_NAME }}];
              END
            "

      - name: Remove SQL firewall rule for GHA runner
        if: ${{ always() && inputs.environmentHash != '' && inputs.ghaEnvironment != 'Main-Gov' }}
        run: |
          ./ops/scripts/pipeline/add-sql-firewall-rule.sh \
            -g ${{ secrets.AZURE_RG }} \
            --stack-name ${{ inputs.stackName }} \
            --server-name ${{ secrets.AZ_SQL_SERVER_NAME }} \
            --delete

      - name: Deploy Dev Users Database
        id: azure-dev-users-deploy
        run: |
          az deployment group create \
            -g ${{ secrets.AZURE_RG }} \
            -f ./ops/cloud-deployment/lib/cosmos/mongo/cosmos-dev-users-database.bicep \
            -p accountName=${{ secrets.AZ_COSMOS_MONGO_ACCOUNT_NAME }}
