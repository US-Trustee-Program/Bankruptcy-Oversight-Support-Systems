name: Azure Deployment - Supporting Infrastructure

on:
  workflow_call:
    inputs:
      ghaEnvironment:
        required: true
        type: string
      apiFunctionName:
        required: true
        type: string
      dataflowsFunctionName:
        required: true
        type: string
      environmentHash:
        required: true
        type: string
      stackName:
        required: true
        type: string

jobs:
  deploy-log-analytics-workspace:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'infrastructure-deploy-main' || 'infrastructure-deploy-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # main

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Fetch config from Key Vault
        env:
          GHA_ENVIRONMENT: ${{ inputs.ghaEnvironment }}
        run: |
          set -euo pipefail
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            KV="kv-ustp-cams"
          else
            KV="kv-ustp-cams-dev"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-ANALYTICS-WORKSPACE-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_ANALYTICS_WORKSPACE_NAME=${_val}" >> "$GITHUB_ENV"

      - name: Deploy Log Analytics Workspace
        id: azure-analytics-deploy
        run: |
          az deployment group create \
            -g ${{ secrets.AZ_ANALYTICS_RG }} \
            -f ./ops/cloud-deployment/lib/analytics/log-analytics-workspace.bicep \
            -p workspaceName=${{ env.AZ_ANALYTICS_WORKSPACE_NAME }} \
               location=${{ secrets.AZ_LOCATION }}

  deploy-db:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'infrastructure-deploy-main' || 'infrastructure-deploy-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # main

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Fetch config from Key Vault
        env:
          GHA_ENVIRONMENT: ${{ inputs.ghaEnvironment }}
        run: |
          set -euo pipefail
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            KV="kv-ustp-cams"
          else
            KV="kv-ustp-cams-dev"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-NETWORK-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          AZ_NETWORK_RG_BASE="${_val}"
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            AZ_NETWORK_RG="${AZ_NETWORK_RG_BASE}"
          else
            AZ_NETWORK_RG="${AZ_NETWORK_RG_BASE}-${{ inputs.environmentHash }}"
          fi
          echo "AZ_NETWORK_RG=${AZ_NETWORK_RG}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-COSMOS-DATABASE-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_COSMOS_DATABASE_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-COSMOS-MONGO-ACCOUNT-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_COSMOS_MONGO_ACCOUNT_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-ANALYTICS-WORKSPACE-ID --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_ANALYTICS_WORKSPACE_ID=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-KV-APP-CONFIG-MANAGED-ID --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_KV_APP_CONFIG_MANAGED_ID=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-KV-APP-CONFIG-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_KV_APP_CONFIG_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-KV-APP-CONFIG-RG-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_KV_APP_CONFIG_RG_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-NETWORK-VNET-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_NETWORK_VNET_NAME=${_val}" >> "$GITHUB_ENV"

      - name: Generate E2E name
        id: generateE2eName
        env:
          GHA_ENVIRONMENT: ${{ inputs.ghaEnvironment }}
        run: |
          e2eDatabaseName="${{ env.AZ_COSMOS_DATABASE_NAME }}-e2e"
          if [[ "${GHA_ENVIRONMENT}" != "Main-Gov" ]]; then
            echo "Adding suffix to database name"
            e2eDatabaseName="${e2eDatabaseName}-${{ inputs.environmentHash }}"
          fi
          echo "e2eDatabaseName=${e2eDatabaseName}" >> $GITHUB_OUTPUT

      - name: Deploy Cosmos MongoDB
        id: azure-mongodb-deploy
        run: |
          allowedNetworks=$(az network vnet subnet list -g ${{ env.AZ_NETWORK_RG }} --vnet-name ${{ env.AZ_NETWORK_VNET_NAME }} --query "[?name=='snet-${{ inputs.apiFunctionName }}' || name=='snet-${{inputs.dataflowsFunctionName}}'].id" -o json)

          ./ops/scripts/pipeline/az-cosmos-deploy.sh \
            -g ${{ secrets.AZURE_RG }} \
            --accountName ${{ env.AZ_COSMOS_MONGO_ACCOUNT_NAME }} \
            --databaseName ${{ env.AZ_COSMOS_DATABASE_NAME }} \
            --environmentName ${{ inputs.ghaEnvironment }} \
            --allowedNetworks "${allowedNetworks}" \
            --analyticsWorkspaceId ${{ env.AZ_ANALYTICS_WORKSPACE_ID }} \
            --actionGroupResourceGroup ${{ secrets.AZ_ANALYTICS_RG }} \
            --actionGroupName ${{ secrets.AZ_ACTION_GROUP_NAME }} \
            --keyVaultName ${{ env.AZ_KV_APP_CONFIG_NAME }} \
            --kvResourceGroup ${{ env.AZ_KV_APP_CONFIG_RG_NAME }} \
            --branchHashId ${{ inputs.environmentHash || 'DOES_NOT_EXIST' }}

      - name: Deploy E2E SQL Database
        id: azure-e2e-sql-deploy
        if: ${{ inputs.environmentHash != '' && inputs.ghaEnvironment != 'Main-Gov' }}
        run: |
          e2eSqlDatabaseName="CAMS_E2E-${{ inputs.environmentHash }}"
          sqlDbExists=$(az sql db show \
            -g ${{ secrets.AZURE_RG }} \
            -s ${{ secrets.AZ_SQL_SERVER_NAME }} \
            -n "${e2eSqlDatabaseName}" \
            --query id -o tsv 2>/dev/null || echo "")
          if [[ -z "${sqlDbExists}" ]]; then
            echo "Creating E2E SQL database ${e2eSqlDatabaseName}"
            az sql db create \
              -g ${{ secrets.AZURE_RG }} \
              -s ${{ secrets.AZ_SQL_SERVER_NAME }} \
              -n "${e2eSqlDatabaseName}" \
              --elastic-pool CAMS-ELASTIC-POOL
          else
            echo "E2E SQL database ${e2eSqlDatabaseName} already exists, skipping"
          fi
          echo "e2eSqlDatabaseName=${e2eSqlDatabaseName}" >> $GITHUB_OUTPUT

      - name: Deploy Dev Users Database
        id: azure-dev-users-deploy
        run: |
          az deployment group create \
            -g ${{ secrets.AZURE_RG }} \
            -f ./ops/cloud-deployment/lib/cosmos/mongo/cosmos-dev-users-database.bicep \
            -p accountName=${{ env.AZ_COSMOS_MONGO_ACCOUNT_NAME }}
