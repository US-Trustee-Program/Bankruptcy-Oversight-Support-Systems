name: End-to-end Tests

on:
  workflow_call:
    inputs:
      apiFunctionName:
        required: true
        type: string
      dataflowsFunctionName:
        required: true
        type: string
      webappName:
        required: true
        type: string
      stackName:
        required: true
        type: string
      ghaEnvironment:
        required: true
        type: string
      branchHashId:
        required: true
        type: string
    secrets:
      AZ_CLIENT_ID:
        required: true
      AZ_TENANT_ID:
        required: true
      AZ_SUBSCRIPTION_ID:
        required: true
      AZ_SQL_SERVER_NAME:
        required: true
      AZ_SQL_IDENTITY_NAME:
        required: true
      MSSQL_PASS:
        required: true
      OKTA_USER_NAME:
        required: true
      OKTA_PASSWORD:
        required: true

jobs:
  playwright-e2e-test:
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'e2e-main' || 'e2e-branch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      priority: 201
    steps:
      - name: Get source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Fetch config from Key Vault
        env:
          GHA_ENVIRONMENT: ${{ inputs.ghaEnvironment }}
          BRANCH_HASH_ID: ${{ inputs.branchHashId }}
        run: |
          set -euo pipefail
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            KV="kv-ustp-cams"
          else
            KV="kv-ustp-cams-dev"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-APP-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          AZ_APP_RG_BASE="${_val}"
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            echo "AZ_APP_RG=${AZ_APP_RG_BASE}" >> "$GITHUB_ENV"
          else
            echo "AZ_APP_RG=${AZ_APP_RG_BASE}-${BRANCH_HASH_ID}" >> "$GITHUB_ENV"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name SLOT-NAME --query value -o tsv 2>/dev/null || true)
          if [[ -z "${_val}" ]]; then
            echo "ERROR: SLOT-NAME secret not found in Key Vault '${KV}'. Cannot deploy to slot." >&2
            exit 1
          fi
          echo "::add-mask::${_val}"
          echo "SLOT_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-COSMOS-DATABASE-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_COSMOS_DATABASE_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-COSMOS-MONGO-ACCOUNT-NAME --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZ_COSMOS_MONGO_ACCOUNT_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name CAMS-LOGIN-PROVIDER --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "CAMS_LOGIN_PROVIDER=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name AZURE-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "AZURE_RG=${_val}" >> "$GITHUB_ENV"

      - name: Enable GHA runner access
        env:
          GHA_ENVIRONMENT: ${{ inputs.ghaEnvironment }}
          AZ_SQL_SERVER_NAME: ${{ secrets.AZ_SQL_SERVER_NAME }} # pragma: allowlist secret
        run: |
          ./ops/scripts/pipeline/dev-add-allowed-ip.sh \
          -g ${{ env.AZ_APP_RG }} \
          -s ${{ inputs.stackName }} \
          -p ${{ env.priority }} \
          --slot-name ${{ env.SLOT_NAME }} \
          --is-cicd

          ./ops/scripts/pipeline/add-sql-firewall-rule.sh \
          -g "${AZURE_RG}" \
          --stack-name ${{ inputs.stackName }} \
          --server-name "${AZ_SQL_SERVER_NAME}"

          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            ./ops/scripts/pipeline/add-cosmos-firewall-rule.sh \
            -g "${AZURE_RG}" \
            --account-name ${{ env.AZ_COSMOS_MONGO_ACCOUNT_NAME }}
          fi

      - name: Provision E2E SQL Database (Main-Gov)
        if: ${{ inputs.ghaEnvironment == 'Main-Gov' }}
        env:
          AZ_SQL_SERVER_NAME: ${{ secrets.AZ_SQL_SERVER_NAME }} # pragma: allowlist secret
          AZ_SQL_IDENTITY_NAME: ${{ secrets.AZ_SQL_IDENTITY_NAME }} # pragma: allowlist secret
          MSSQL_PASS: ${{ secrets.MSSQL_PASS }} # pragma: allowlist secret
        run: |
          e2eSqlDatabaseName="CAMS_E2E"
          sqlDbExists=$(az sql db show \
            -g "${AZURE_RG}" \
            -s "${AZ_SQL_SERVER_NAME}" \
            -n "${e2eSqlDatabaseName}" \
            --query id -o tsv 2>/dev/null || echo "")
          if [[ -z "${sqlDbExists}" ]]; then
            echo "Creating E2E SQL database ${e2eSqlDatabaseName}"
            az sql db create \
              -g "${AZURE_RG}" \
              -s "${AZ_SQL_SERVER_NAME}" \
              -n "${e2eSqlDatabaseName}" \
              --elastic-pool CAMS-ELASTIC-POOL
          else
            echo "E2E SQL database ${e2eSqlDatabaseName} already exists, skipping creation"
          fi

          echo "Provisioning E2E SQL Database user..."
          ./ops/scripts/pipeline/az-sql-provision-e2e-db-user.sh \
            --resource-group "${AZURE_RG}" \
            --server-name "${AZ_SQL_SERVER_NAME}" \
            --database "${e2eSqlDatabaseName}" \
            --identity-name "${AZ_SQL_IDENTITY_NAME}" \
            --identity-client-id "$(az identity show -g "${AZURE_RG}" -n "${AZ_SQL_IDENTITY_NAME}" --query clientId -o tsv)" \
            --sa-password "${MSSQL_PASS}"

      - name: Install Application Node Dependencies
        run: npm ci

      - name: Install E2E Node dependencies
        working-directory: test/e2e
        run: |
          npm ci
          npx playwright install chromium msedge

      - name: Seed e2e database
        env:
          GHA_ENVIRONMENT: ${{ inputs.ghaEnvironment }}
          BRANCH_HASH_ID: ${{ inputs.branchHashId }}
          AZ_SQL_SERVER_NAME: ${{ secrets.AZ_SQL_SERVER_NAME }} # pragma: allowlist secret
          MSSQL_PASS: ${{ secrets.MSSQL_PASS }} # pragma: allowlist secret
        run: |
          # Seed MongoDB
          e2eDatabaseName="${{ env.AZ_COSMOS_DATABASE_NAME }}-e2e"
          if [[ "${GHA_ENVIRONMENT}" != "Main-Gov" ]]; then
            e2eDatabaseName="${e2eDatabaseName}-${BRANCH_HASH_ID}"
          fi

          export MONGO_CONNECTION_STRING="$(az cosmosdb keys list \
            -g "${AZURE_RG}" \
            -n ${{ env.AZ_COSMOS_MONGO_ACCOUNT_NAME }} \
            --type connection-strings \
            --query "connectionStrings[?description=='Primary MongoDB Connection String'].connectionString" \
            -o tsv)"
          export COSMOS_DATABASE_NAME="${e2eDatabaseName}"

          echo "Seeding E2E MongoDB..."
          (cd ./test/e2e && npm run seed)

          # Seed SQL Server
          e2eSqlDatabaseName="CAMS_E2E"
          if [[ "${GHA_ENVIRONMENT}" != "Main-Gov" ]]; then
            e2eSqlDatabaseName="CAMS_E2E-${BRANCH_HASH_ID}"
          fi

          echo "Seeding E2E SQL Server..."
          sql_hostname_suffix=$(az cloud show --query "suffixes.sqlServerHostname" -o tsv)
          sa_user=$(az sql server show -g "${AZURE_RG}" -n "${AZ_SQL_SERVER_NAME}" --query administratorLogin -o tsv)
          export LOCAL_MSSQL_HOST="${AZ_SQL_SERVER_NAME}${sql_hostname_suffix}"
          export LOCAL_MSSQL_USER="${sa_user}"
          export LOCAL_MSSQL_PASS="${MSSQL_PASS}"
          export MSSQL_DATABASE_DXTR="${e2eSqlDatabaseName}"
          export MSSQL_ENCRYPT=true
          export MSSQL_TRUST_UNSIGNED_CERT=false
          (cd ./test/e2e && npm run seed:sql)

      - name: Run E2E Tests
        id: e2eTests
        working-directory: test/e2e
        env:
          WEBAPP_NAME: ${{ inputs.webappName }}
          OKTA_USER_NAME: ${{ secrets.OKTA_USER_NAME }} # pragma: allowlist secret
          OKTA_PASSWORD: ${{ secrets.OKTA_PASSWORD }} # pragma: allowlist secret
        run: |
          echo "Running Playwright Tests..."
          mkdir -p playwright/.auth
          SLOT_NAME=${{ env.SLOT_NAME }} TARGET_HOST="https://${WEBAPP_NAME}-${{ env.SLOT_NAME }}.azurewebsites.us" CAMS_LOGIN_PROVIDER=${{ env.CAMS_LOGIN_PROVIDER }} npx playwright test --reporter=list,html

      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: test/e2e/playwright-report/
          retention-days: 30

      - name: Disable GHA runner access
        if: always()
        env:
          GHA_ENVIRONMENT: ${{ inputs.ghaEnvironment }}
          AZ_SQL_SERVER_NAME: ${{ secrets.AZ_SQL_SERVER_NAME }} # pragma: allowlist secret
        run: |
          name="gha-${{ env.priority }}-${{ inputs.stackName }}"
          ./ops/scripts/pipeline/dev-rm-allowed-ip.sh \
          -g ${{ env.AZ_APP_RG }} \
          -s ${{ inputs.stackName }} \
          -r ${name:0:32} \
          --slot-name ${{ env.SLOT_NAME }}

          ./ops/scripts/pipeline/add-sql-firewall-rule.sh \
          -g "${AZURE_RG}" \
          --stack-name ${{ inputs.stackName }} \
          --server-name "${AZ_SQL_SERVER_NAME}" \
          --delete

          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            ./ops/scripts/pipeline/add-cosmos-firewall-rule.sh \
            -g "${AZURE_RG}" \
            --account-name ${{ env.AZ_COSMOS_MONGO_ACCOUNT_NAME }} \
            --delete
          fi
