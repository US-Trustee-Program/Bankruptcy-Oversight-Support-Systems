name: Continuous Deployment

concurrency: ${{ github.ref }}-${{ github.workflow }}

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '**/*.md'
    branches-ignore:
      - 'mob/**'
  workflow_dispatch:
    inputs:
      deployBranch:
        description:
          'deployBranch: Provision Azure resources for development branch and deploy build.'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  setup:
    name: Setup
    uses: ./.github/workflows/reusable-build-info.yml
    secrets: inherit # pragma: allowlist secret
    with:
      environment: ${{ endsWith(github.ref,'refs/heads/main') && 'Main-Gov' || 'Develop' }}

  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      common: ${{ steps.detect.outputs.common }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get changed source files per workspace
        id: detect
        shell: bash
        run: |
          BASE=${{ github.event.before }}
          HEAD=${{ github.sha }}

          # First push to a new branch has no base; skip focused coverage
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "First push to branch, skipping focused coverage"
            echo "backend=" >> "$GITHUB_OUTPUT"
            echo "frontend=" >> "$GITHUB_OUTPUT"
            echo "common=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- '*.ts' '*.tsx' \
            | grep -v '\.d\.ts$\|vitest\.config\|eslint\.config\|playwright\.config' \
            || true)

          BACKEND=$(echo "$CHANGED" | grep '^backend/' | sed 's|^backend/||' | tr '\n' ' ' | xargs || true)
          FRONTEND=$(echo "$CHANGED" | grep '^user-interface/src/' | sed 's|^user-interface/||' | tr '\n' ' ' | xargs || true)
          COMMON=$(echo "$CHANGED" | grep '^common/src/' | sed 's|^common/||' | tr '\n' ' ' | xargs || true)

          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"
          echo "common=$COMMON" >> "$GITHUB_OUTPUT"

  accessibility-test:
    uses: ./.github/workflows/reusable-accessibility.yml
    with:
      path: user-interface
      node-version: ${{ vars.NODE_VERSION }}

  unit-test-frontend:
    needs: [detect-changes]
    uses: ./.github/workflows/reusable-unit-test.yml
    with:
      path: user-interface
      node-version: ${{ vars.NODE_VERSION }}
      changed-files: ${{ needs.detect-changes.outputs.frontend }}

  unit-test-backend:
    needs: [detect-changes]
    uses: ./.github/workflows/reusable-unit-test.yml
    with:
      path: backend
      node-version: ${{ vars.NODE_VERSION }}
      changed-files: ${{ needs.detect-changes.outputs.backend }}

  unit-test-common:
    needs: [detect-changes]
    uses: ./.github/workflows/reusable-unit-test.yml
    with:
      path: common
      node-version: ${{ vars.NODE_VERSION }}
      changed-files: ${{ needs.detect-changes.outputs.common }}

  knip:
    uses: ./.github/workflows/reusable-knip.yml
    with:
      node-version: ${{ vars.NODE_VERSION }}

  security-scan:
    name: Security
    uses: ./.github/workflows/sub-security-scan.yml
    secrets: inherit # pragma: allowlist secret

  build:
    name: Build
    needs: [setup]
    uses: ./.github/workflows/sub-build.yml
    secrets: inherit # pragma: allowlist secret
    with:
      nodeVersion: ${{ vars.NODE_VERSION }}
      camsServerPort: ${{ vars.CAMS_SERVER_PORT }}
      camsServerProtocol: ${{ vars.CAMS_SERVER_PROTOCOL }}
      camsBasePath: ${{ vars.CAMS_BASE_PATH }}
      webappName: ${{ needs.setup.outputs.webappName }}
      apiFunctionName: ${{ needs.setup.outputs.apiFunctionName }}
      dataflowsFunctionName: ${{ needs.setup.outputs.dataflowsFunctionName }}
      environment: ${{ needs.setup.outputs.ghaEnvironment }}
      launchDarklyEnvironment: ${{ vars.CAMS_LAUNCH_DARKLY_ENV }}
      azResourceGrpAppEncrypted: ${{ needs.setup.outputs.azResourceGrpAppEncrypted }}
      slotName: ${{ needs.setup.outputs.slotName }}

  deploy:
    name: Cloud Resource Deployment
    uses: ./.github/workflows/sub-deploy.yml
    needs:
      [
        setup,
        build,
        accessibility-test,
        unit-test-frontend,
        unit-test-backend,
        unit-test-common,
        security-scan,
        knip,
      ]
    if: ((github.ref == 'refs/heads/main') || (inputs.deployBranch == 'true'))
    with:
      ghaEnvironment: ${{ needs.setup.outputs.ghaEnvironment }}
      azResourceGrpAppEncrypted: ${{ needs.setup.outputs.azResourceGrpAppEncrypted }}
      azResourceGrpNetworkEncrypted: ${{ needs.setup.outputs.azResourceGrpNetworkEncrypted }}
      stackName: ${{ needs.setup.outputs.stackName }}
      apiFunctionName: ${{ needs.setup.outputs.apiFunctionName }}
      dataflowsFunctionName: ${{ needs.setup.outputs.dataflowsFunctionName }}
      webappName: ${{ needs.setup.outputs.webappName }}
      environmentHash: ${{ needs.setup.outputs.environmentHash }}
      deployVnet: ${{ needs.setup.outputs.deployVnet }}
      slotName: ${{ needs.setup.outputs.slotName }}
    secrets: inherit # pragma: allowlist secret

  deploy-code-slot:
    name: Slot Code Deployment
    uses: ./.github/workflows/sub-deploy-code-slot.yml
    needs: [setup, deploy]
    with:
      ghaEnvironment: ${{ needs.setup.outputs.ghaEnvironment }}
      azResourceGrpAppEncrypted: ${{ needs.setup.outputs.azResourceGrpAppEncrypted }}
      stackName: ${{ needs.setup.outputs.stackName }}
      apiFunctionName: ${{ needs.setup.outputs.apiFunctionName }}
      dataflowsFunctionName: ${{ needs.setup.outputs.dataflowsFunctionName }}
      webappName: ${{ needs.setup.outputs.webappName }}
      environmentHash: ${{ needs.setup.outputs.environmentHash }}
      slotName: ${{ needs.setup.outputs.slotName }}
      initialDeployment: ${{ needs.setup.outputs.initialDeployment }}
    secrets: inherit # pragma: allowlist secret
