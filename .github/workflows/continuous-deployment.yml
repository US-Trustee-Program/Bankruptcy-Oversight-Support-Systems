name: Continuous Deployment

concurrency: ${{ github.ref }}-${{ github.workflow }}

on:
  push:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '**/*.md'
    branches-ignore:
      - 'mob/**'
  workflow_dispatch:
    inputs:
      deployBranch:
        description:
          'deployBranch: Provision Azure resources for development branch and deploy build.' # pragma: allowlist secret
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      migrateSecrets:
        description: 'migrateSecrets: Copy GitHub environment secrets/vars to Key Vault (one-time migration). Runs against the environment matching the branch (Develop or Main-Gov).' # pragma: allowlist secret
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions: read-all

jobs:
  setup:
    name: Setup
    uses: ./.github/workflows/reusable-build-info.yml
    permissions:
      contents: read
      id-token: write
    secrets: inherit # pragma: allowlist secret
    with:
      environment: ${{ endsWith(github.ref,'refs/heads/main') && 'Main-Gov' || 'Develop' }}

  migrate-secrets-to-keyvault:
    name: Migrate Secrets to Key Vault
    runs-on: ubuntu-latest
    if: inputs.migrateSecrets == 'true' # pragma: allowlist secret
    environment: ${{ endsWith(github.ref, 'refs/heads/main') && 'Main-Gov' || 'Develop' }}
    permissions:
      contents: read
      id-token: none

    steps:
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Set Key Vault name
        id: kv
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=kv-ustp-cams" >> "$GITHUB_OUTPUT"
          else
            echo "name=kv-ustp-cams-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Write secrets
        run: |
          KV="${{ steps.kv.outputs.name }}"
          az keyvault secret set --vault-name "$KV" --name AZ-APP-RG                    --value "${{ secrets.AZ_APP_RG }}"                   --output none
          az keyvault secret set --vault-name "$KV" --name AZ-NETWORK-RG                --value "${{ secrets.AZ_NETWORK_RG }}"               --output none
          az keyvault secret set --vault-name "$KV" --name AZ-ANALYTICS-WORKSPACE-ID    --value "${{ secrets.AZ_ANALYTICS_WORKSPACE_ID }}"   --output none
          az keyvault secret set --vault-name "$KV" --name AZ-ANALYTICS-WORKSPACE-NAME  --value "${{ secrets.AZ_ANALYTICS_WORKSPACE_NAME }}" --output none
          az keyvault secret set --vault-name "$KV" --name AZ-COSMOS-DATABASE-NAME      --value "${{ secrets.AZ_COSMOS_DATABASE_NAME }}"     --output none
          az keyvault secret set --vault-name "$KV" --name AZ-COSMOS-MONGO-ACCOUNT-NAME --value "${{ secrets.AZ_COSMOS_MONGO_ACCOUNT_NAME }}" --output none
          az keyvault secret set --vault-name "$KV" --name AZ-COSMOS-ID-NAME            --value "${{ secrets.AZ_COSMOS_ID_NAME }}"           --output none
          az keyvault secret set --vault-name "$KV" --name AZ-KV-APP-CONFIG-MANAGED-ID  --value "${{ secrets.AZ_KV_APP_CONFIG_MANAGED_ID }}" --output none
          az keyvault secret set --vault-name "$KV" --name AZ-KV-APP-CONFIG-NAME        --value "${{ secrets.AZ_KV_APP_CONFIG_NAME }}"       --output none
          az keyvault secret set --vault-name "$KV" --name AZ-KV-APP-CONFIG-RG-NAME     --value "${{ secrets.AZ_KV_APP_CONFIG_RG_NAME }}"    --output none

      - name: Write variables
        run: |
          KV="${{ steps.kv.outputs.name }}"
          az keyvault secret set --vault-name "$KV" --name AZ-PLAN-TYPE                   --value "${{ vars.AZ_PLAN_TYPE }}"                   --output none
          az keyvault secret set --vault-name "$KV" --name AZ-NETWORK-VNET-NAME           --value "${{ vars.AZ_NETWORK_VNET_NAME }}"           --output none
          az keyvault secret set --vault-name "$KV" --name CAMS-ENABLED-DATAFLOWS         --value "${{ vars.CAMS_ENABLED_DATAFLOWS }}"         --output none
          az keyvault secret set --vault-name "$KV" --name CAMS-LOGIN-PROVIDER            --value "${{ vars.CAMS_LOGIN_PROVIDER }}"            --output none
          az keyvault secret set --vault-name "$KV" --name AZURE-CORE-USE-MSAL-HTTP-CACHE --value "${{ vars.AZURE_CORE_USE_MSAL_HTTP_CACHE }}" --output none
          az keyvault secret set --vault-name "$KV" --name MSSQL-REQUEST-TIMEOUT          --value "${{ vars.MSSQL_REQUEST_TIMEOUT }}"          --output none

      - name: Write Develop-only variables
        if: github.ref != 'refs/heads/main'
        run: |
          az keyvault secret set --vault-name kv-ustp-cams-dev --name SLOT-NAME --value "${{ vars.SLOT_NAME }}" --output none

  accessibility-test:
    uses: ./.github/workflows/reusable-accessibility.yml
    permissions:
      contents: read
    with:
      path: user-interface
      node-version: ${{ vars.NODE_VERSION }}

  unit-test-frontend:
    uses: ./.github/workflows/reusable-unit-test.yml
    permissions:
      contents: read
    with:
      path: user-interface
      node-version: ${{ vars.NODE_VERSION }}

  unit-test-backend:
    uses: ./.github/workflows/reusable-unit-test.yml
    permissions:
      contents: read
    with:
      path: backend
      node-version: ${{ vars.NODE_VERSION }}

  unit-test-common:
    uses: ./.github/workflows/reusable-unit-test.yml
    permissions:
      contents: read
    with:
      path: common
      node-version: ${{ vars.NODE_VERSION }}

  knip:
    uses: ./.github/workflows/reusable-knip.yml
    permissions:
      contents: read
    with:
      node-version: ${{ vars.NODE_VERSION }}

  typecheck:
    uses: ./.github/workflows/reusable-typecheck.yml
    permissions:
      contents: read
    with:
      node-version: ${{ vars.NODE_VERSION }}

  security-scan:
    name: Security
    uses: ./.github/workflows/sub-security-scan.yml
    permissions:
      contents: read
      id-token: write
      security-events: write
    secrets:
      AZ_SECURITY_SCAN_CLIENT_ID: ${{ secrets.AZ_SECURITY_SCAN_CLIENT_ID }} # pragma: allowlist secret
      AZ_TENANT_ID: ${{ secrets.AZ_TENANT_ID }} # pragma: allowlist secret
      AZ_SUBSCRIPTION_ID: ${{ secrets.AZ_SUBSCRIPTION_ID }} # pragma: allowlist secret

  build:
    name: Build
    needs: [setup]
    uses: ./.github/workflows/sub-build.yml
    permissions:
      contents: read
      id-token: write
    secrets: inherit # pragma: allowlist secret
    with:
      nodeVersion: ${{ vars.NODE_VERSION }}
      camsServerPort: ${{ vars.CAMS_SERVER_PORT }}
      camsServerProtocol: ${{ vars.CAMS_SERVER_PROTOCOL }}
      camsBasePath: ${{ vars.CAMS_BASE_PATH }}
      webappName: ${{ needs.setup.outputs.webappName }}
      apiFunctionName: ${{ needs.setup.outputs.apiFunctionName }}
      dataflowsFunctionName: ${{ needs.setup.outputs.dataflowsFunctionName }}
      environment: ${{ needs.setup.outputs.ghaEnvironment }}
      launchDarklyEnvironment: ${{ vars.CAMS_LAUNCH_DARKLY_ENV }}
      azResourceGrpAppEncrypted: ${{ needs.setup.outputs.azResourceGrpAppEncrypted }}
      slotName: ${{ needs.setup.outputs.slotName }}

  deploy:
    name: Cloud Resource Deployment
    uses: ./.github/workflows/sub-deploy.yml
    permissions:
      contents: read
      id-token: write
    needs:
      [
        setup,
        build,
        accessibility-test,
        unit-test-frontend,
        unit-test-backend,
        unit-test-common,
        security-scan,
        knip,
        typecheck,
      ]
    if: ((github.ref == 'refs/heads/main') || (inputs.deployBranch == 'true'))
    with:
      ghaEnvironment: ${{ needs.setup.outputs.ghaEnvironment }}
      azResourceGrpAppEncrypted: ${{ needs.setup.outputs.azResourceGrpAppEncrypted }}
      azResourceGrpNetworkEncrypted: ${{ needs.setup.outputs.azResourceGrpNetworkEncrypted }}
      stackName: ${{ needs.setup.outputs.stackName }}
      apiFunctionName: ${{ needs.setup.outputs.apiFunctionName }}
      dataflowsFunctionName: ${{ needs.setup.outputs.dataflowsFunctionName }}
      webappName: ${{ needs.setup.outputs.webappName }}
      environmentHash: ${{ needs.setup.outputs.environmentHash }}
      deployVnet: ${{ needs.setup.outputs.deployVnet }}
      slotName: ${{ needs.setup.outputs.slotName }}
    secrets: inherit # pragma: allowlist secret

  deploy-code-slot:
    name: Slot Code Deployment
    uses: ./.github/workflows/sub-deploy-code-slot.yml
    permissions:
      contents: read
      id-token: write
    needs: [setup, deploy]
    with:
      ghaEnvironment: ${{ needs.setup.outputs.ghaEnvironment }}
      azResourceGrpAppEncrypted: ${{ needs.setup.outputs.azResourceGrpAppEncrypted }}
      stackName: ${{ needs.setup.outputs.stackName }}
      apiFunctionName: ${{ needs.setup.outputs.apiFunctionName }}
      dataflowsFunctionName: ${{ needs.setup.outputs.dataflowsFunctionName }}
      webappName: ${{ needs.setup.outputs.webappName }}
      environmentHash: ${{ needs.setup.outputs.environmentHash }}
      slotName: ${{ needs.setup.outputs.slotName }}
      initialDeployment: ${{ needs.setup.outputs.initialDeployment }}
    secrets: inherit # pragma: allowlist secret
