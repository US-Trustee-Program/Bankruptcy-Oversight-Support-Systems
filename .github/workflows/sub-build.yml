name: Build

on:
  workflow_call:
    inputs:
      apiFunctionName:
        required: true
        type: string
      dataflowsFunctionName:
        required: true
        type: string
      camsServerPort:
        required: true
        type: string
      camsServerProtocol:
        required: true
        type: string
      camsBasePath:
        required: true
        type: string
      webappName:
        required: true
        type: string
      environment:
        required: true
        type: string
      environmentHash:
        required: false
        type: string
        default: ''
      launchDarklyEnvironment:
        required: true
        type: string
    secrets:
      AZ_CLIENT_ID:
        required: true
      AZ_TENANT_ID:
        required: true
      AZ_SUBSCRIPTION_ID:
        required: true
      LD_DEVELOPMENT_CLIENT_ID:
        required: true

permissions:
  contents: read

jobs:
  build-frontend-predeployment:
    name: Build Frontend Predeployment
    uses: ./.github/workflows/reusable-build-frontend.yml
    permissions:
      contents: read
      id-token: write
    secrets:
      AZ_CLIENT_ID: ${{ secrets.AZ_CLIENT_ID }} # pragma: allowlist secret
      AZ_TENANT_ID: ${{ secrets.AZ_TENANT_ID }} # pragma: allowlist secret
      AZ_SUBSCRIPTION_ID: ${{ secrets.AZ_SUBSCRIPTION_ID }} # pragma: allowlist secret
      LD_DEVELOPMENT_CLIENT_ID: ${{ secrets.LD_DEVELOPMENT_CLIENT_ID }} # pragma: allowlist secret
    with:
      camsServerHostname: ${{ inputs.apiFunctionName }}.azurewebsites.us
      apiFunctionName: ${{ inputs.apiFunctionName }}
      camsServerPort: ${{ vars.CAMS_SERVER_PORT }}
      camsServerProtocol: ${{ vars.CAMS_SERVER_PROTOCOL }}
      camsBasePath: ${{ vars.CAMS_BASE_PATH }}
      webappName: ${{ inputs.webappName }}
      environment: ${{ inputs.environment }}
      environmentHash: ${{ inputs.environmentHash }}
      launchDarklyEnvironment: ${{ vars.CAMS_LAUNCH_DARKLY_ENV }}

  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Dependencies
        run: npm ci

      - name: Build Common, Backend, API, and Dataflows
        run: |
          npm run build:backend
          npm run build:api
          npm run build:dataflows

      - name: Package API
        working-directory: backend
        env:
          API_FUNCTION_NAME: ${{ inputs.apiFunctionName }}
        run: OUT="${API_FUNCTION_NAME}" npm run pack:api

      - name: Package Data Flow Artifact
        working-directory: backend
        env:
          DATAFLOWS_FUNCTION_NAME: ${{ inputs.dataflowsFunctionName }}
        run: OUT="${DATAFLOWS_FUNCTION_NAME}" npm run pack:dataflows

      - name: Upload API Azure Functions Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.apiFunctionName }}-build
          path: backend/function-apps/api/${{ inputs.apiFunctionName }}.zip
          if-no-files-found: error

      - name: Upload Data Flows Azure Functions Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.dataflowsFunctionName }}-build
          path: backend/function-apps/dataflows/${{ inputs.dataflowsFunctionName }}.zip
          if-no-files-found: error
