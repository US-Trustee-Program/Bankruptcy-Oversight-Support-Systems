name: Build Frontend

on:
  workflow_call:
    inputs:
      isDeployment:
        default: false
        type: boolean
      camsServerHostname:
        required: true
        type: string
      apiFunctionName:
        required: true
        type: string
      camsServerPort:
        required: true
        type: string
      camsServerProtocol:
        required: true
        type: string
      camsBasePath:
        required: true
        type: string
      webappName:
        required: true
        type: string
      environment:
        required: true
        type: string
      launchDarklyEnvironment:
        required: true
        type: string
      environmentHash:
        required: false
        type: string
        default: ''
    secrets:
      AZ_CLIENT_ID:
        required: true
      AZ_TENANT_ID:
        required: true
      AZ_SUBSCRIPTION_ID:
        required: true
      LD_DEVELOPMENT_CLIENT_ID:
        required: true
jobs:
  build-frontend:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'Main-Gov' && 'build-frontend-main' || 'build-frontend-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Fetch config from Key Vault
        env:
          GHA_ENVIRONMENT: ${{ inputs.environment }}
          ENVIRONMENT_HASH: ${{ inputs.environmentHash }}
        run: |
          set -euo pipefail
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            KV="kv-ustp-cams"
          else
            KV="kv-ustp-cams-dev"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-APP-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          AZ_APP_RG_BASE="${_val}"
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            echo "AZ_APP_RG=${AZ_APP_RG_BASE}" >> "$GITHUB_ENV"
          else
            echo "AZ_APP_RG=${AZ_APP_RG_BASE}-${ENVIRONMENT_HASH}" >> "$GITHUB_ENV"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name SLOT-NAME --query value -o tsv 2>/dev/null || true)
          if [[ -n "${_val}" ]]; then echo "::add-mask::${_val}"; fi
          echo "SLOT_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name CAMS-LOGIN-PROVIDER --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "CAMS_LOGIN_PROVIDER=${_val}" >> "$GITHUB_ENV"

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Execute Build
        env:
          WEBAPP_NAME: ${{ inputs.webappName }}
          CAMS_SERVER_HOSTNAME: ${{ inputs.camsServerHostname }}
          CAMS_SERVER_PORT: ${{ inputs.camsServerPort }}
          CAMS_SERVER_PROTOCOL: ${{ inputs.camsServerProtocol }}
          CAMS_BASE_PATH: ${{ inputs.camsBasePath }}
          CAMS_FEATURE_FLAG_CLIENT_ID: ${{ secrets.LD_DEVELOPMENT_CLIENT_ID }}
          CAMS_LAUNCH_DARKLY_ENV: ${{ inputs.launchDarklyEnvironment }}
          CAMS_INFO_SHA: ${{ github.sha }}
          CAMS_LOGIN_PROVIDER_CONFIG: ${{ vars.CAMS_LOGIN_PROVIDER_CONFIG }}
        run: |
          appiString=$(az monitor app-insights component show --app "appi-${WEBAPP_NAME}" -g  ${{ env.AZ_APP_RG }} --query "connectionString" -o tsv || true)

          export CAMS_SERVER_HOSTNAME="${CAMS_SERVER_HOSTNAME}"
          export CAMS_SERVER_PORT="${CAMS_SERVER_PORT}"
          export CAMS_SERVER_PROTOCOL="${CAMS_SERVER_PROTOCOL}"
          export CAMS_BASE_PATH="${CAMS_BASE_PATH}"
          export CAMS_APPLICATIONINSIGHTS_CONNECTION_STRING="${appiString}"
          export CAMS_FEATURE_FLAG_CLIENT_ID="${CAMS_FEATURE_FLAG_CLIENT_ID}"
          export CAMS_LAUNCH_DARKLY_ENV="${CAMS_LAUNCH_DARKLY_ENV}"
          export CAMS_LOGIN_PROVIDER=${{ env.CAMS_LOGIN_PROVIDER }}
          export CAMS_LOGIN_PROVIDER_CONFIG="${CAMS_LOGIN_PROVIDER_CONFIG}"
          export CAMS_INFO_SHA="${CAMS_INFO_SHA}"
          npm run build:user-interface

      - name: Generate Slot Configuration
        working-directory: user-interface
        env:
          WEBAPP_NAME: ${{ inputs.webappName }}
          API_FUNCTION_NAME: ${{ inputs.apiFunctionName }}
          CAMS_SERVER_PORT: ${{ inputs.camsServerPort }}
          CAMS_SERVER_PROTOCOL: ${{ inputs.camsServerProtocol }}
          CAMS_BASE_PATH: ${{ inputs.camsBasePath }}
          CAMS_FEATURE_FLAG_CLIENT_ID: ${{ secrets.LD_DEVELOPMENT_CLIENT_ID }}
          CAMS_LAUNCH_DARKLY_ENV: ${{ inputs.launchDarklyEnvironment }}
          CAMS_INFO_SHA: ${{ github.sha }}
          CAMS_LOGIN_PROVIDER_CONFIG: ${{ vars.CAMS_LOGIN_PROVIDER_CONFIG }}
        run: |
          SLOT_NAME="${{ env.SLOT_NAME || 'staging' }}"
          echo "Slot name: ${SLOT_NAME}"
          STAGING_HOSTNAME="${API_FUNCTION_NAME}-${SLOT_NAME}.azurewebsites.us"
          echo "Staging hostname: ${STAGING_HOSTNAME}"
          appiString=$(az monitor app-insights component show --app "appi-${WEBAPP_NAME}" -g  ${{ env.AZ_APP_RG }} --query "connectionString" -o tsv || true)
          export CAMS_SERVER_HOSTNAME="${STAGING_HOSTNAME}"
          export CAMS_SERVER_PORT="${CAMS_SERVER_PORT}"
          export CAMS_SERVER_PROTOCOL="${CAMS_SERVER_PROTOCOL}"
          export CAMS_BASE_PATH="${CAMS_BASE_PATH}"
          export CAMS_APPLICATIONINSIGHTS_CONNECTION_STRING="${appiString}"
          export CAMS_FEATURE_FLAG_CLIENT_ID="${CAMS_FEATURE_FLAG_CLIENT_ID}"
          export CAMS_LAUNCH_DARKLY_ENV="${CAMS_LAUNCH_DARKLY_ENV}"
          export CAMS_LOGIN_PROVIDER=${{ env.CAMS_LOGIN_PROVIDER }}
          export CAMS_LOGIN_PROVIDER_CONFIG="${CAMS_LOGIN_PROVIDER_CONFIG}"
          export CAMS_INFO_SHA="${CAMS_INFO_SHA}"
          export SLOT_NAME="${SLOT_NAME}"
          npm run slotConfig
          mv ./public/configuration-${SLOT_NAME}.json ./build/

      - name: Package
        if: inputs.isDeployment
        working-directory: user-interface
        env:
          WEBAPP_NAME: ${{ inputs.webappName }}
        run: |
          pushd ./build
          zip -r "./${WEBAPP_NAME}.zip" .
          popd
          mkdir ./artifacts
          mv "./build/${WEBAPP_NAME}.zip" ./artifacts/

      - name: Upload Frontend Artifact
        if: inputs.isDeployment
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.webappName }}-build
          path: user-interface/artifacts/
          if-no-files-found: error
