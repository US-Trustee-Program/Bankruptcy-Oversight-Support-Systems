name: Build Frontend

on:
  workflow_call:
    inputs:
      nodeVersion:
        required: true
        type: string
      isDeployment:
        default: false
        type: boolean
      camsServerHostname:
        required: true
        type: string
      camsStagingHostname:
        required: true
        type: string
      camsServerPort:
        required: true
        type: string
      camsServerProtocol:
        required: true
        type: string
      camsBasePath:
        required: true
        type: string
      webappName:
        required: true
        type: string
      environment:
        required: true
        type: string
      launchDarklyEnvironment:
        required: true
        type: string
      azResourceGrpApp:
        required: true
        type: string
jobs:
  build-frontend:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'Main-Gov' && 'build-frontend-main' || 'build-frontend-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Fetch config from Key Vault
        run: |
          set -euo pipefail
          if [[ "${{ inputs.environment }}" == "Main-Gov" ]]; then
            KV="kv-ustp-cams"
          else
            KV="kv-ustp-cams-dev"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name SLOT-NAME --query value -o tsv 2>/dev/null || true)
          if [[ -n "${_val}" ]]; then echo "::add-mask::${_val}"; fi
          echo "SLOT_NAME=${_val}" >> "$GITHUB_ENV"
          _val=$(az keyvault secret show --vault-name "$KV" --name CAMS-LOGIN-PROVIDER --query value -o tsv)
          echo "::add-mask::${_val}"
          echo "CAMS_LOGIN_PROVIDER=${_val}" >> "$GITHUB_ENV"

      - name: Use Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ inputs.nodeVersion }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Execute Build
        run: |
          appiString=$(az monitor app-insights component show --app appi-${{ inputs.webappName }} -g  ${{ inputs.azResourceGrpApp }} --query "connectionString" -o tsv || true)

          export CAMS_SERVER_HOSTNAME=${{ inputs.camsServerHostname }}
          export CAMS_SERVER_PORT=${{ inputs.camsServerPort }}
          export CAMS_SERVER_PROTOCOL=${{ inputs.camsServerProtocol }}
          export CAMS_BASE_PATH=${{ inputs.camsBasePath }}
          export CAMS_APPLICATIONINSIGHTS_CONNECTION_STRING="${appiString}"
          export CAMS_FEATURE_FLAG_CLIENT_ID="${{ secrets.LD_DEVELOPMENT_CLIENT_ID }}"
          export CAMS_LAUNCH_DARKLY_ENV="${{ inputs.launchDarklyEnvironment }}"
          export CAMS_LOGIN_PROVIDER=${{ env.CAMS_LOGIN_PROVIDER }}
          export CAMS_LOGIN_PROVIDER_CONFIG='${{ vars.CAMS_LOGIN_PROVIDER_CONFIG }}'
          export CAMS_INFO_SHA=${{ github.sha }}
          npm run build:user-interface

      - name: Generate Slot Configuration
        working-directory: user-interface
        run: |
          echo "Slot name: ${{ env.SLOT_NAME }}"
          echo "Staging hostname: ${{ inputs.camsStagingHostname }}"
          appiString=$(az monitor app-insights component show --app appi-${{ inputs.webappName }} -g  ${{ inputs.azResourceGrpApp }} --query "connectionString" -o tsv || true)
          export CAMS_SERVER_HOSTNAME=${{ inputs.camsStagingHostname }}
          export CAMS_SERVER_PORT=${{ inputs.camsServerPort }}
          export CAMS_SERVER_PROTOCOL=${{ inputs.camsServerProtocol }}
          export CAMS_BASE_PATH=${{ inputs.camsBasePath }}
          export CAMS_APPLICATIONINSIGHTS_CONNECTION_STRING="${appiString}"
          export CAMS_FEATURE_FLAG_CLIENT_ID="${{ secrets.LD_DEVELOPMENT_CLIENT_ID }}"
          export CAMS_LAUNCH_DARKLY_ENV="${{ inputs.launchDarklyEnvironment }}"
          export CAMS_LOGIN_PROVIDER=${{ env.CAMS_LOGIN_PROVIDER }}
          export CAMS_LOGIN_PROVIDER_CONFIG='${{ vars.CAMS_LOGIN_PROVIDER_CONFIG }}'
          export CAMS_INFO_SHA=${{ github.sha }}
          export SLOT_NAME=${{ env.SLOT_NAME || 'staging' }}
          npm run slotConfig
          mv ./public/configuration-${SLOT_NAME}.json ./build/

      - name: Package
        if: inputs.isDeployment
        working-directory: user-interface
        run: |
          pushd ./build
          zip -r ./${{ inputs.webappName }}.zip .
          popd
          mkdir ./artifacts
          mv ./build/${{ inputs.webappName }}.zip ./artifacts/

      - name: Upload Frontend Artifact
        if: inputs.isDeployment
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.webappName }}-build
          path: user-interface/artifacts/
          if-no-files-found: error
