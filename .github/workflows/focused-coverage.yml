name: Focused Coverage (PR)

# Runs coverage only for files changed in a PR, giving a fast, targeted view
# of how well the changed code is tested. Does not enforce thresholds so it
# complements (not replaces) the full coverage run in continuous-deployment.yml.

on:
  pull_request:
    paths:
      - '**/*.ts'
      - '**/*.tsx'

jobs:
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
      common: ${{ steps.detect.outputs.common }}
      has-backend: ${{ steps.detect.outputs.has-backend }}
      has-frontend: ${{ steps.detect.outputs.has-frontend }}
      has-common: ${{ steps.detect.outputs.has-common }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get changed source files per workspace
        id: detect
        shell: bash
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.sha }}

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- '*.ts' '*.tsx' \
            | grep -v '\.d\.ts$\|vitest\.config\|eslint\.config\|playwright\.config' \
            || true)

          echo "--- All changed TS/TSX files ---"
          echo "$CHANGED"

          # Backend: lib/ and function-apps/ under backend/ (strip 'backend/' prefix)
          BACKEND=$(echo "$CHANGED" | grep '^backend/' | sed 's|^backend/||' | tr '\n' ' ' | xargs || true)

          # Frontend: user-interface/src/ (strip 'user-interface/' prefix)
          FRONTEND=$(echo "$CHANGED" | grep '^user-interface/src/' | sed 's|^user-interface/||' | tr '\n' ' ' | xargs || true)

          # Common: common/src/ (strip 'common/' prefix)
          COMMON=$(echo "$CHANGED" | grep '^common/src/' | sed 's|^common/||' | tr '\n' ' ' | xargs || true)

          echo "backend=$BACKEND" >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"
          echo "common=$COMMON" >> "$GITHUB_OUTPUT"

          echo "has-backend=$([ -n "$BACKEND" ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "has-frontend=$([ -n "$FRONTEND" ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "has-common=$([ -n "$COMMON" ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

          echo "--- Grouped by workspace ---"
          echo "backend:  $BACKEND"
          echo "frontend: $FRONTEND"
          echo "common:   $COMMON"

  coverage-backend:
    name: Focused Coverage - Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.has-backend == 'true'
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build common
        run: npm run build:common

      - name: Run focused coverage for changed backend files
        working-directory: backend
        shell: bash
        env:
          CAMS_LOGIN_PROVIDER_CONFIG: '{"issuer": "http://localhost:7071/api/oauth2/default", "clientId": ""}'
        run: |
          FILES="${{ needs.detect-changes.outputs.backend }}"

          # For each changed file, resolve its co-located test file(s).
          # Also pass changed test files through directly.
          TEST_FILES=""
          INCLUDE_FLAGS=""
          for f in $FILES; do
            if echo "$f" | grep -qE '\.(test|spec)\.(ts|tsx)$'; then
              TEST_FILES="$TEST_FILES $f"
            else
              BASE="${f%.*}"
              for candidate in "${BASE}.test.ts" "${BASE}.test.tsx" "${BASE}.spec.ts" "${BASE}.spec.tsx"; do
                [ -f "$candidate" ] && TEST_FILES="$TEST_FILES $candidate"
              done
              INCLUDE_FLAGS="$INCLUDE_FLAGS --coverage.include=$f"
            fi
          done

          if [ -z "$TEST_FILES" ]; then
            echo "No test files found for the changed files. Skipping."
            exit 0
          fi

          echo "Running tests: $TEST_FILES"

          # Thresholds are disabled here — the full coverage run enforces them.
          npx vitest run --reporter=verbose --coverage \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.branches=0 \
            $INCLUDE_FLAGS \
            $TEST_FILES

  coverage-frontend:
    name: Focused Coverage - Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.has-frontend == 'true'
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run focused coverage for changed frontend files
        working-directory: user-interface
        shell: bash
        run: |
          FILES="${{ needs.detect-changes.outputs.frontend }}"

          # For each changed file, resolve its co-located test file(s).
          # Also pass changed test files through directly.
          TEST_FILES=""
          INCLUDE_FLAGS=""
          for f in $FILES; do
            if echo "$f" | grep -qE '\.(test|spec)\.(ts|tsx)$'; then
              TEST_FILES="$TEST_FILES $f"
            else
              BASE="${f%.*}"
              for candidate in "${BASE}.test.ts" "${BASE}.test.tsx" "${BASE}.spec.ts" "${BASE}.spec.tsx"; do
                [ -f "$candidate" ] && TEST_FILES="$TEST_FILES $candidate"
              done
              INCLUDE_FLAGS="$INCLUDE_FLAGS --coverage.include=$f"
            fi
          done

          if [ -z "$TEST_FILES" ]; then
            echo "No test files found for the changed files. Skipping."
            exit 0
          fi

          echo "Running tests: $TEST_FILES"

          export CAMS_USE_FAKE_API=true
          # Thresholds are disabled here — the full coverage run enforces them.
          npx vitest run --reporter=verbose --coverage \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.branches=0 \
            $INCLUDE_FLAGS \
            $TEST_FILES

  coverage-common:
    name: Focused Coverage - Common
    needs: detect-changes
    if: needs.detect-changes.outputs.has-common == 'true'
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run focused coverage for changed common files
        working-directory: common
        shell: bash
        run: |
          FILES="${{ needs.detect-changes.outputs.common }}"

          # For each changed file, resolve its co-located test file(s).
          # Also pass changed test files through directly.
          TEST_FILES=""
          INCLUDE_FLAGS=""
          for f in $FILES; do
            if echo "$f" | grep -qE '\.(test|spec)\.(ts|tsx)$'; then
              TEST_FILES="$TEST_FILES $f"
            else
              BASE="${f%.*}"
              for candidate in "${BASE}.test.ts" "${BASE}.test.tsx" "${BASE}.spec.ts" "${BASE}.spec.tsx"; do
                [ -f "$candidate" ] && TEST_FILES="$TEST_FILES $candidate"
              done
              INCLUDE_FLAGS="$INCLUDE_FLAGS --coverage.include=$f"
            fi
          done

          if [ -z "$TEST_FILES" ]; then
            echo "No test files found for the changed files. Skipping."
            exit 0
          fi

          echo "Running tests: $TEST_FILES"

          # Thresholds are disabled here — the full coverage run enforces them.
          npx vitest run --reporter=verbose --coverage \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.branches=0 \
            $INCLUDE_FLAGS \
            $TEST_FILES
