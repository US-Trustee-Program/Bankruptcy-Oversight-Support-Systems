name: Deploy code for slot

on:
  workflow_call:
    inputs:
      ghaEnvironment:
        required: true
        type: string
      environmentHash:
        required: true
        type: string
      stackName:
        required: true
        type: string
      webappName:
        required: true
        type: string
      apiFunctionName:
        required: true
        type: string
      dataflowsFunctionName:
        required: true
        type: string
      azResourceGrpApp:
        required: true
        type: string
      slotName:
        required: true
        type: string
      initialDeployment:
        required: true
        type: string

jobs:
  deploy-code:
    if: ${{ inputs.initialDeployment == 'true' }}
    name: Slot Code Deployment
    uses: ./.github/workflows/sub-deploy-code.yml
    permissions:
      contents: read
      id-token: write
    with:
      ghaEnvironment: ${{ inputs.ghaEnvironment }}
      environmentHash: ${{ inputs.environmentHash }}
      stackName: ${{ inputs.stackName }}
      webappName: ${{ inputs.webappName }}
      apiFunctionName: ${{ inputs.apiFunctionName }}
      dataflowsFunctionName: ${{ inputs.dataflowsFunctionName }}
      azResourceGrpApp: ${{ inputs.azResourceGrpApp }}
    secrets: inherit # pragma: allowlist secret

  deploy-webapp-slot:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # main

      - name: Download artifact from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.webappName }}-build

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Verify downloaded artifact
        run: |
          echo "Verifying artifact contents..."
          ls -lh ./${{ inputs.webappName }}.zip
          unzip -l ./${{ inputs.webappName }}.zip | head -20
          unzip -p ./${{ inputs.webappName }}.zip index.html | grep -i "meta name=\"info-sha\"" || echo "SHA meta tag not found"

      - name: Deploy to Azure WebApp Slot
        id: deploy-webapp-slot-step
        run: |
          ./ops/scripts/pipeline/slots/az-app-slot-deploy.sh \
          --src ./${{ inputs.webappName }}.zip \
          -g ${{ inputs.azResourceGrpApp }} \
          -n ${{ inputs.webappName }} \
          --slotName ${{ inputs.slotName }} \
          --gitSha ${{ github.sha }}

  deploy-api-slot:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # main

      - name: Download artifact from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.apiFunctionName }}-build

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Deploy Azure Function API slot
        id: deploy-api-slot-step
        run: |
          ./ops/scripts/pipeline/slots/az-func-slot-deploy.sh \
          -g ${{ inputs.azResourceGrpApp }} \
          -n ${{ inputs.apiFunctionName }} \
          --src ./${{ inputs.apiFunctionName }}.zip \
          --slotName ${{ inputs.slotName }} \
          --commitSha ${{ github.sha }}

  deploy-dataflows-slot:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # main

      - name: Download artifact from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.dataflowsFunctionName }}-build

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Deploy Azure Function Data Flows Function slot
        id: deploy-dataflows-slot-step
        run: |
          az functionapp start -g ${{ inputs.azResourceGrpApp }} --name ${{ inputs.dataflowsFunctionName }} --slot ${{ inputs.slotName }}

          ./ops/scripts/pipeline/slots/az-func-slot-deploy.sh \
          -g ${{ inputs.azResourceGrpApp }} \
          -n ${{ inputs.dataflowsFunctionName }} \
          --src ./${{ inputs.dataflowsFunctionName }}.zip \
          --slotName ${{ inputs.slotName }} \
          --commitSha ${{ github.sha }}

  endpoint-test-application-slot:
    needs: [deploy-webapp-slot, deploy-api-slot, deploy-dataflows-slot]
    uses: ./.github/workflows/reusable-endpoint-test.yml
    permissions:
      contents: read
      id-token: write
    with:
      stackName: ${{ inputs.stackName }}
      webappName: ${{ inputs.webappName }}
      apiFunctionName: ${{ inputs.apiFunctionName }}
      branchHashId: ${{ inputs.environmentHash }}
      ghaEnvironment: ${{ inputs.ghaEnvironment }}
      azResourceGrpApp: ${{ inputs.azResourceGrpApp }}
      slotName: ${{ inputs.slotName }}
    secrets: inherit # pragma: allowlist secret

  execute-e2e-test:
    needs:
      [deploy-webapp-slot, deploy-api-slot, deploy-dataflows-slot, endpoint-test-application-slot]
    uses: ./.github/workflows/reusable-e2e.yml
    permissions:
      contents: read
      id-token: write
    with:
      apiFunctionName: ${{ inputs.apiFunctionName }}
      dataflowsFunctionName: ${{ inputs.dataflowsFunctionName }}
      slotName: ${{ inputs.slotName }}
      webappName: ${{ inputs.webappName }}
      stackName: ${{ inputs.stackName }}
      azResourceGrpApp: ${{ inputs.azResourceGrpApp }}
      ghaEnvironment: ${{ inputs.ghaEnvironment }}
      branchHashId: ${{ inputs.environmentHash }}
    secrets: inherit # pragma: allowlist secret

  swap-webapp-deployment-slot:
    if: ${{ inputs.initialDeployment != 'true' }}
    runs-on: ubuntu-latest
    needs: [deploy-webapp-slot, deploy-api-slot, deploy-dataflows-slot, execute-e2e-test]
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    env:
      webappName: ${{ inputs.webappName }}
      slotName: ${{ inputs.slotName }}
    steps:
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}
      - name: Swap Deployment Slot
        run: |
          az webapp deployment slot swap --slot ${{ env.slotName }} --name ${{ env.webappName }} -g ${{ inputs.azResourceGrpApp }}
          az webapp traffic-routing clear --name ${{ env.webappName }} -g ${{ inputs.azResourceGrpApp }}

  swap-nodeapi-deployment-slot:
    if: ${{ inputs.initialDeployment != 'true' }}
    runs-on: ubuntu-latest
    needs: [deploy-webapp-slot, deploy-api-slot, deploy-dataflows-slot, execute-e2e-test]
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    env:
      apiFunctionName: ${{ inputs.apiFunctionName }}
      slotName: ${{ inputs.slotName }}
    steps:
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}
      - name: Swap Deployment Slot
        run: |
          az functionapp deployment slot swap --slot ${{ env.slotName }} --name ${{ env.apiFunctionName }} -g ${{ inputs.azResourceGrpApp }}
          az webapp traffic-routing clear --name ${{ env.apiFunctionName }} -g ${{ inputs.azResourceGrpApp }}

  swap-dataflows-app-deployment-slot:
    if: ${{ inputs.initialDeployment != 'true' }}
    runs-on: ubuntu-latest
    needs: [deploy-webapp-slot, deploy-api-slot, deploy-dataflows-slot, execute-e2e-test]
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    env:
      slotName: ${{ inputs.slotName }}
    steps:
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}
      - name: Swap Deployment Slot
        run: |
          az functionapp deployment slot swap --slot ${{ env.slotName }} --name ${{ inputs.dataflowsFunctionName }} -g ${{ inputs.azResourceGrpApp }}
          az webapp traffic-routing clear --name ${{ inputs.dataflowsFunctionName }} -g ${{ inputs.azResourceGrpApp }}
          az functionapp stop -g ${{ inputs.azResourceGrpApp }} --name ${{ inputs.dataflowsFunctionName }} --slot ${{ inputs.slotName }}

  endpoint-test-application-post-swap:
    needs:
      [
        swap-nodeapi-deployment-slot,
        swap-webapp-deployment-slot,
        swap-dataflows-app-deployment-slot,
      ]
    uses: ./.github/workflows/reusable-endpoint-test.yml
    permissions:
      contents: read
      id-token: write
    with:
      stackName: ${{ inputs.stackName }}
      webappName: ${{ inputs.webappName }}
      apiFunctionName: ${{ inputs.apiFunctionName }}
      branchHashId: ${{ inputs.environmentHash }}
      ghaEnvironment: ${{ inputs.ghaEnvironment }}
      azResourceGrpApp: ${{ inputs.azResourceGrpApp }}
      slotName: 'self'
    secrets: inherit # pragma: allowlist secret
  enable-access:
    runs-on: ubuntu-latest
    needs: [endpoint-test-application-post-swap]
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    env:
      webappName: ${{ inputs.webappName }}
      apiFunctionName: ${{ inputs.apiFunctionName }}
    steps:
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Ensure correct access rules post-swap
        run: |
          # Production slot: ensure Allow all for webapp and API (Flexion only)
          # Note: Dataflows remains deny-by-default for both USTP and Flexion
          az webapp config access-restriction add --resource-group ${{ inputs.azResourceGrpApp }} --name ${{ env.webappName }} --rule-name AllowAll --action Allow --ip-address 0.0.0.0/0 --priority 100 1>/dev/null || true
          az functionapp config access-restriction add --resource-group ${{ inputs.azResourceGrpApp }} --name ${{ env.apiFunctionName }} --rule-name AllowAll --action Allow --ip-address 0.0.0.0/0 --priority 100 1>/dev/null || true

          # Staging slot: lock down after swap (was production, now staging)
          az webapp config access-restriction set --resource-group ${{ inputs.azResourceGrpApp }} --name ${{ env.webappName }} --slot ${{ inputs.slotName }} --default-action Deny 2>/dev/null || true
          az functionapp config access-restriction set --resource-group ${{ inputs.azResourceGrpApp }} --name ${{ env.apiFunctionName }} --slot ${{ inputs.slotName }} --default-action Deny 2>/dev/null || true
          az functionapp config access-restriction set --resource-group ${{ inputs.azResourceGrpApp }} --name ${{ inputs.dataflowsFunctionName }} --slot ${{ inputs.slotName }} --default-action Deny 2>/dev/null || true
