name: Pull Request E2E Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit SHA to run E2E tests against'
        required: true
        default: 'main'
      force_rebuild_deps:
        description: 'Force rebuild of e2e_deps image (bypasses ghcr.io cache)'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.head_ref || github.ref }}-${{ github.workflow }}

jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qvE '^docs/|\.md$|^(\.gitignore|renovate\.json|\.mob)$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip E2E (no relevant changes)
        if: steps.changes.outputs.relevant == 'false'
        run: echo "No code, test, CI/CD, or IaC changes detected — skipping E2E."

      - name: Setup Node.js
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.changes.outputs.relevant == 'true'
        run: npm ci

      - name: Set up E2E environment
        if: steps.changes.outputs.relevant == 'true'
        working-directory: test/e2e
        run: |
          echo "TARGET_HOST=http://localhost:3000" > .env
          echo "CAMS_LOGIN_PROVIDER=okta" >> .env
          echo "CAMS_LOGIN_PROVIDER_CONFIG=issuer=https://integrator-2053366.okta.com/oauth2/default|clientId=0oaxs7u9a4fpATGwF697" >> .env
          echo "OKTA_API_KEY=${{ secrets.OKTA_API_KEY }}" >> .env
          echo "CAMS_USER_GROUP_GATEWAY_CONFIG=${{ secrets.CAMS_USER_GROUP_GATEWAY_CONFIG }}" >> .env
          echo "OKTA_USER_NAME=${{ secrets.OKTA_USER_NAME }}" >> .env
          echo "OKTA_PASSWORD=${{ secrets.OKTA_PASSWORD }}" >> .env
          echo "COSMOS_DATABASE_NAME=cams-e2e" >> .env
          echo "MONGO_CONNECTION_STRING=mongodb://mongodb:27017/cams-e2e?retrywrites=false" >> .env
          echo "DATABASE_MOCK=false" >> .env
          echo "MSSQL_HOST=sqlserver" >> .env
          echo "MSSQL_DATABASE=" >> .env
          echo "MSSQL_DATABASE_DXTR=CAMS_E2E" >> .env
          echo "MSSQL_USER=sa" >> .env
          echo "MSSQL_PASS=${{ secrets.MSSQL_PASS }}" >> .env
          echo "MSSQL_ENCRYPT=false" >> .env
          echo "MSSQL_TRUST_UNSIGNED_CERT=true" >> .env
          echo "SLOT_NAME=local" >> .env
          echo "CAMS_SERVER_HOSTNAME=localhost" >> .env
          echo "CAMS_SERVER_PORT=7071" >> .env
          echo "CAMS_SERVER_PROTOCOL=http" >> .env
          echo "CAMS_BASE_PATH=/api" >> .env

      - name: Install podman and podman-compose
        if: steps.changes.outputs.relevant == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose

      - name: Pull base images from ghcr.io cache
        if: steps.changes.outputs.relevant == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: test/e2e/scripts/pull-base-images.sh

      - name: Run E2E Tests
        if: steps.changes.outputs.relevant == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          FORCE_REBUILD_DEPS: ${{ inputs.force_rebuild_deps || 'false' }}
        run: npm run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: steps.changes.outputs.relevant == 'true' && (success() || failure())
        with:
          name: playwright-report
          path: test/e2e/playwright-report/
          retention-days: 30

      - name: Upload Container Logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: steps.changes.outputs.relevant == 'true' && (success() || failure())
        with:
          name: container-logs
          path: test/e2e/container-logs/
          retention-days: 7
