name: Pull Request E2E Validation

on:
  pull_request:
    branches:
      - main-copy-for-testing  # Testing branch (change to 'main' after validation)
    types:
      - ready_for_review  # When PR moved from draft to ready
      - labeled           # When run-e2e-tests label is added
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '**/*.md'

concurrency:
  group: pr-e2e-staging-slot
  cancel-in-progress: false  # Queue PRs, don't cancel

jobs:
  setup:
    name: Setup
    # Only run if explicitly requested via label or ready_for_review
    if: |
      github.event.action == 'ready_for_review' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e-tests')
    uses: ./.github/workflows/reusable-build-info.yml
    secrets: inherit # pragma: allowlist secret
    with:
      environment: 'Develop'  # Always use Develop for PRs
      branchNameOverride: ${{ github.base_ref }}  # Use target branch for resource naming

  run-e2e-tests:
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@1d43b558a22d42588147775b8426d1354032d1f4 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up E2E environment
        working-directory: test/e2e
        run: |
          cp .env.local.example .env
          # Replace placeholder with secret
          sed -i "s/<your-okta-password>/${{ secrets.OKTA_PASSWORD }}/" .env
          # Override connection string to use localhost (from host network mode)
          sed -i "s|MONGO_CONNECTION_STRING=.*|MONGO_CONNECTION_STRING=mongodb://localhost:27017/cams-e2e-${{ needs.setup.outputs.environmentHash }}| " .env
          # Use the environment hash for unique resource naming if needed
          echo "COSMOS_DATABASE_NAME=cams-e2e-${{ needs.setup.outputs.environmentHash }}" >> .env
          echo "MSSQL_DATABASE_DXTR=CAMS_E2E_${{ needs.setup.outputs.environmentHash }}" >> .env

      - name: Install podman and podman-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose

      - name: Run E2E Tests
        run: npm run test:e2e -- --reseed

      - name: Upload Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-report
          path: test/e2e/playwright-report/
          retention-days: 30

      - name: Upload Backend Logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: backend-logs
          path: test/e2e/backend-logs/
          retention-days: 7
