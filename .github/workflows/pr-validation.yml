name: Pull Request E2E Validation

on:
  pull_request:
    branches:
      - main
    types:
      - ready_for_review  # When PR moved from draft to ready
      - labeled           # When run-e2e-tests label is added
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit SHA to run E2E tests against'
        required: true
        default: 'main'

concurrency:
  group: pr-e2e-staging-slot
  cancel-in-progress: false  # Queue PRs, don't cancel

jobs:
  run-e2e-tests:
    # On pull_request: only run if explicitly requested via label or ready_for_review
    # On workflow_dispatch: always run
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.action == 'ready_for_review' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e-tests')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up E2E environment
        working-directory: test/e2e
        run: |
          echo "TARGET_HOST=http://localhost:3000" > .env
          echo "CAMS_LOGIN_PROVIDER=okta" >> .env
          echo "CAMS_LOGIN_PROVIDER_CONFIG=issuer=https://integrator-2053366.okta.com/oauth2/default|clientId=0oaxs7u9a4fpATGwF697" >> .env
          echo "OKTA_API_KEY=${{ secrets.OKTA_API_KEY }}" >> .env
          echo "CAMS_USER_GROUP_GATEWAY_CONFIG=${{ secrets.CAMS_USER_GROUP_GATEWAY_CONFIG }}" >> .env
          echo "OKTA_USER_NAME=${{ secrets.OKTA_USER_NAME }}" >> .env
          echo "OKTA_PASSWORD=${{ secrets.OKTA_PASSWORD }}" >> .env
          echo "COSMOS_DATABASE_NAME=cams-e2e" >> .env
          echo "MONGO_CONNECTION_STRING=mongodb://mongodb:27017/cams-e2e?retrywrites=false" >> .env
          echo "DATABASE_MOCK=false" >> .env
          echo "MSSQL_HOST=sqlserver" >> .env
          echo "MSSQL_DATABASE=" >> .env
          echo "MSSQL_DATABASE_DXTR=CAMS_E2E" >> .env
          echo "MSSQL_USER=sa" >> .env
          echo "MSSQL_PASS=${{ secrets.MSSQL_PASS }}" >> .env
          echo "MSSQL_ENCRYPT=false" >> .env
          echo "MSSQL_TRUST_UNSIGNED_CERT=true" >> .env
          echo "SLOT_NAME=local" >> .env
          echo "CAMS_SERVER_HOSTNAME=localhost" >> .env
          echo "CAMS_SERVER_PORT=7071" >> .env
          echo "CAMS_SERVER_PROTOCOL=http" >> .env
          echo "CAMS_BASE_PATH=/api" >> .env

      - name: Install podman and podman-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose

      - name: Discover bridge gateway IP for host-network containers
        # The backend runs on host network (needed for Azurite UseDevelopmentStorage=true).
        # Rootless Podman (slirp4netns/pasta) does NOT expose published bridge-container ports
        # via localhost from within a host-network container. We must use the bridge gateway IP
        # (e.g. 10.89.0.1) instead, which is how the host sees the bridge network.
        # Pre-create the bridge network, discover its gateway, and patch MSSQL_HOST in .env.
        working-directory: test/e2e
        run: |
          podman network create e2e_cams-e2e 2>/dev/null || true
          BRIDGE_GW=$(podman network inspect e2e_cams-e2e 2>/dev/null | python3 -c "import sys,json; nets=json.load(sys.stdin); print(nets[0]['subnets'][0]['gateway'])" 2>/dev/null || echo "")
          echo "Bridge gateway IP: ${BRIDGE_GW}"
          if [ -z "${BRIDGE_GW}" ]; then
            echo "WARNING: Could not determine bridge gateway IP, falling back to 10.89.0.1"
            BRIDGE_GW="10.89.0.1"
          fi
          # Patch MSSQL_HOST and MONGO_CONNECTION_STRING to use the bridge gateway IP
          # so the host-network backend container can reach bridge-network services
          sed -i "s|^MSSQL_HOST=.*|MSSQL_HOST=${BRIDGE_GW}|" .env
          sed -i "s|^MONGO_CONNECTION_STRING=mongodb://[^/]*/|MONGO_CONNECTION_STRING=mongodb://${BRIDGE_GW}:27017/|" .env
          echo "Updated .env:"
          grep -E "MSSQL_HOST|MONGO_CONNECTION_STRING" .env

      - name: Pull base images from ghcr.io cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: test/e2e/scripts/pull-base-images.sh

      - name: Run E2E Tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: npm run test:e2e -- --reseed

      - name: Upload Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-report
          path: test/e2e/playwright-report/
          retention-days: 30

      - name: Upload Container Logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: container-logs
          path: test/e2e/container-logs/
          retention-days: 7
