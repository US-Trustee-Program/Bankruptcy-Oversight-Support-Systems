name: Pull Request E2E Validation

on:
  pull_request:
    branches:
      - main
    types:
      - ready_for_review  # When PR moved from draft to ready
      - labeled           # When run-e2e-tests label is added
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '**/*.md'

concurrency:
  group: pr-e2e-staging-slot
  cancel-in-progress: false  # Queue PRs, don't cancel

jobs:
  setup:
    name: Setup
    # Only run if explicitly requested via label or ready_for_review
    if: |
      github.event.action == 'ready_for_review' ||
      contains(github.event.pull_request.labels.*.name, 'run-e2e-tests')
    uses: ./.github/workflows/reusable-build-info.yml
    secrets: inherit # pragma: allowlist secret
    with:
      environment: 'Develop'  # Always use Develop for PRs
      branchNameOverride: ${{ github.head_ref }}  # Use source branch for resource naming

  run-e2e-tests:
    needs: [setup]
    runs-on: ubuntu-latest
    environment: Develop
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up E2E environment
        working-directory: test/e2e
        run: |
          echo "TARGET_HOST=http://localhost:3000" > .env
          echo "CAMS_LOGIN_PROVIDER=okta" >> .env
          echo "CAMS_LOGIN_PROVIDER_CONFIG=${{ vars.CAMS_LOGIN_PROVIDER_CONFIG }}" >> .env
          echo "OKTA_USER_NAME=${{ secrets.OKTA_USER_NAME }}" >> .env
          echo "OKTA_PASSWORD=${{ secrets.OKTA_PASSWORD }}" >> .env
          echo "COSMOS_DATABASE_NAME=cams-e2e" >> .env
          echo "MONGO_CONNECTION_STRING=mongodb://mongodb:27017/cams-e2e?retrywrites=false" >> .env
          echo "DATABASE_MOCK=false" >> .env
          echo "MSSQL_HOST=sqlserver" >> .env
          echo "MSSQL_DATABASE=" >> .env
          echo "MSSQL_DATABASE_DXTR=CAMS_E2E" >> .env
          echo "MSSQL_USER=sa" >> .env
          echo "MSSQL_PASS=${{ secrets.MSSQL_PASS }}" >> .env
          echo "MSSQL_SA_PASSWORD=${{ secrets.MSSQL_PASS }}" >> .env
          echo "MSSQL_ENCRYPT=false" >> .env
          echo "MSSQL_TRUST_UNSIGNED_CERT=true" >> .env
          echo "SLOT_NAME=local" >> .env

      - name: Install podman and podman-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose

      - name: Run E2E Tests
        run: npm run test:e2e -- --reseed

      - name: Upload Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-report
          path: test/e2e/playwright-report/
          retention-days: 30

      - name: Upload Backend Logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: backend-logs
          path: test/e2e/backend-logs/
          retention-days: 7
