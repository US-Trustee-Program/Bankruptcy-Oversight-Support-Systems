name: Refresh E2E Base Image Cache

on:
  schedule:
    - cron: '0 5 * * 0'  # Weekly on Sunday at 05:00 UTC (before prune at 06:00)
  workflow_dispatch:       # Allow manual trigger

jobs:
  refresh:
    name: Re-cache upstream base images to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Refresh base images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: test/e2e/scripts/cache-base-images.sh
