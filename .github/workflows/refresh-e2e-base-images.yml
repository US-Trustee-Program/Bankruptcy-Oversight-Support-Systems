name: Refresh E2E Base Image Cache

on:
  schedule:
    - cron: '0 5 * * 0'  # Weekly on Sunday at 05:00 UTC (before prune at 06:00)
  workflow_dispatch:       # Allow manual trigger

permissions: read-all

jobs:
  refresh:
    name: Re-cache upstream base images to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Refresh base images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: test/e2e/scripts/cache-base-images.sh
