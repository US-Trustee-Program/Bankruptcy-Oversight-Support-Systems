name: Deploy code

on:
  workflow_call:
    inputs:
      ghaEnvironment:
        required: true
        type: string
      environmentHash:
        required: true
        type: string
      stackName:
        required: true
        type: string
      webappName:
        required: true
        type: string
      apiFunctionName:
        required: true
        type: string
      dataflowsFunctionName:
        required: true
        type: string
      azResourceGrpApp:
        required: true
        type: string

jobs:
  deploy-webapp:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # main

      - name: Download artifact from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.webappName }}-build

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Deploy to Azure WebApp
        id: deploy-webapp-step
        run: |
          ./ops/scripts/pipeline/az-app-deploy.sh \
          --src ./${{ inputs.webappName }}.zip \
          -g ${{ inputs.azResourceGrpApp }} \
          -n ${{ inputs.webappName }}

  deploy-api:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # main

      - name: Download artifact from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.apiFunctionName }}-build

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Deploy Azure Functions API
        id: deploy-backend-api-step
        run: |
          sleep 30 &&
          ./ops/scripts/pipeline/az-func-deploy.sh \
          -g ${{ inputs.azResourceGrpApp }} \
          -n ${{ inputs.apiFunctionName }} \
          --src ./${{ inputs.apiFunctionName }}.zip

  deploy-dataflows-app:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # main

      - name: Download artifact from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.dataflowsFunctionName }}-build

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Deploy Data Flows Azure Function App
        id: deploy-dataflows-app-step
        run: |
          sleep 30 &&
          ./ops/scripts/pipeline/az-func-deploy.sh \
          -g ${{ inputs.azResourceGrpApp }} \
          -n ${{ inputs.dataflowsFunctionName }} \
          --src ./${{ inputs.dataflowsFunctionName }}.zip

  endpoint-test-application: # TODO: healthcheck/endpoint test on new dataflows function app?
    needs: [deploy-webapp, deploy-api, deploy-dataflows-app]
    uses: ./.github/workflows/reusable-endpoint-test.yml
    permissions:
      contents: read
      id-token: write
    with:
      stackName: ${{ inputs.stackName }}
      webappName: ${{ inputs.webappName }}
      apiFunctionName: ${{ inputs.apiFunctionName }}
      branchHashId: ${{ inputs.environmentHash }}
      ghaEnvironment: ${{ inputs.ghaEnvironment }}
      azResourceGrpApp: ${{ inputs.azResourceGrpApp }}
      slotName: 'initial'
    secrets: inherit # pragma: allowlist secret

  enable-access:
    runs-on: ubuntu-latest
    needs: [endpoint-test-application]
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'deploy-code-main' || 'deploy-code-branch' }}
    permissions:
      contents: read
      id-token: write
    env:
      webappName: ${{ inputs.webappName }}
      apiFunctionName: ${{ inputs.apiFunctionName }}
    steps:
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Enable production slot access
        run: |
          az webapp config access-restriction add --resource-group ${{ inputs.azResourceGrpApp }} --name ${{ env.webappName }} --rule-name AllowAll --action Allow --ip-address 0.0.0.0/0 --priority 100 1>/dev/null || true
          az functionapp config access-restriction add --resource-group ${{ inputs.azResourceGrpApp }} --name ${{ env.apiFunctionName }} --rule-name AllowAll --action Allow --ip-address 0.0.0.0/0 --priority 100 1>/dev/null || true
