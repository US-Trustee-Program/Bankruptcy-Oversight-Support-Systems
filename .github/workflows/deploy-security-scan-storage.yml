name: Deploy Security Scan Storage

on:
  workflow_dispatch:

permissions: read-all

jobs:
  deploy-storage:
    name: Deploy Scan Storage
    runs-on: ubuntu-latest
    environment: security-scan
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_SECURITY_SCAN_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Deploy security scan storage account
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file ops/cloud-deployment/security-scan-storage.bicep \
            --parameters storageAccountName="$STORAGE_ACCOUNT_NAME"
        env:
          RESOURCE_GROUP: ${{ secrets.AZ_SECURITY_SCAN_RG }}
          STORAGE_ACCOUNT_NAME: ${{ secrets.AZ_SECURITY_SCAN_STORAGE_NAME }}
