name: Endpoint Tests

on:
  workflow_call:
    inputs:
      apiFunctionName:
        required: true
        type: string
      webappName:
        required: true
        type: string
      stackName:
        required: true
        type: string
      ghaEnvironment:
        required: true
        type: string
      branchHashId:
        required: true
        type: string
      slotNameOverride:
        required: false
        type: string
        default: ''
        description: 'Override slot name (e.g. "initial" or "self"). When empty, fetched from Key Vault.'
    secrets:
      AZ_CLIENT_ID:
        required: true
      AZ_TENANT_ID:
        required: true
      AZ_SUBSCRIPTION_ID:
        required: true

permissions:
  contents: read

jobs:
  endpoint-test-application:
    runs-on: ubuntu-latest
    environment: ${{ inputs.ghaEnvironment == 'Main-Gov' && 'endpoint-test-main' || 'endpoint-test-branch' }}
    permissions:
      contents: read
      id-token: write
    env:
      stackName: ${{ inputs.stackName }}
      webappName: ${{ inputs.webappName }}
      apiFunctionName: ${{ inputs.apiFunctionName }}
      branchHashId: ${{ inputs.branchHashId }}
      priority: 200
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZ_CLIENT_ID }}
          tenant-id: ${{ secrets.AZ_TENANT_ID }}
          subscription-id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          environment: ${{ vars.AZURE_ENVIRONMENT }}

      - name: Fetch config from Key Vault
        env:
          GHA_ENVIRONMENT: ${{ inputs.ghaEnvironment }}
          SLOT_NAME_OVERRIDE: ${{ inputs.slotNameOverride }}
        run: |
          set -euo pipefail
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            KV="kv-ustp-cams"
          else
            KV="kv-ustp-cams-dev"
          fi
          _val=$(az keyvault secret show --vault-name "$KV" --name AZ-APP-RG --query value -o tsv)
          echo "::add-mask::${_val}"
          AZ_APP_RG_BASE="${_val}"
          if [[ "${GHA_ENVIRONMENT}" == "Main-Gov" ]]; then
            echo "AZ_APP_RG=${AZ_APP_RG_BASE}" >> "$GITHUB_ENV"
          else
            echo "AZ_APP_RG=${AZ_APP_RG_BASE}-${{ inputs.branchHashId }}" >> "$GITHUB_ENV"
          fi
          if [[ -n "${SLOT_NAME_OVERRIDE}" ]]; then
            echo "SLOT_NAME=${SLOT_NAME_OVERRIDE}" >> "$GITHUB_ENV"
          else
            _val=$(az keyvault secret show --vault-name "$KV" --name SLOT-NAME --query value -o tsv 2>/dev/null || true)
            if [[ -z "${_val}" ]]; then
              echo "ERROR: SLOT-NAME secret not found in Key Vault '${KV}'. Cannot deploy to slot." >&2
              exit 1
            fi
            echo "::add-mask::${_val}"
            echo "SLOT_NAME=${_val}" >> "$GITHUB_ENV"
          fi

      - name: Enable GHA runner access
        run: |
          ./ops/scripts/pipeline/dev-add-allowed-ip.sh \
          -g ${{ env.AZ_APP_RG }} \
          -s ${{ env.stackName }} \
          -p ${{ env.priority }} \
          --slot-name ${{ env.SLOT_NAME }} \
          --is-cicd

      - name: Health check App Resources
        run: |
          ./ops/scripts/pipeline/endpoint-test.sh \
          --apiFunctionName ${{ inputs.apiFunctionName }} \
          --webappName ${{ inputs.webappName }} \
          --gitSha ${{ github.sha }} \
          --slotName ${{ env.SLOT_NAME }} \
          --resourceGroup ${{ env.AZ_APP_RG }}

      - name: Disable GHA runner access
        if: always()
        run: |
          name="gha-${{ env.priority }}-${{ env.stackName }}"
          ./ops/scripts/pipeline/dev-rm-allowed-ip.sh \
          -g ${{ env.AZ_APP_RG }} \
          -s ${{ env.stackName }} \
          -r ${name:0:32} \
          --slot-name ${{ env.SLOT_NAME }}
