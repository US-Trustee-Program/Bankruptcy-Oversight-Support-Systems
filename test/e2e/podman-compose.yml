version: '3.8'

# Simplified E2E architecture:
# - backend: all-in-one container (MongoDB + SQL Edge + Azurite + Functions host)
# - frontend: Vite preview server
# - playwright: test runner
#
# All services use host networking â€” every port is on localhost.

services:
  # All-in-one backend: MongoDB, SQL Edge, Azurite, and Azure Functions
  # Databases run internally on localhost within the container.
  # Only port 7071 (API) is exposed to the host for Playwright/frontend.
  backend:
    build:
      context: ../../
      dockerfile: test/e2e/Dockerfile.backend
    container_name: cams-backend-e2e
    ports:
      - "7071:7071"
    restart: "no"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DOTENV_CONFIG_SILENT=true
      - DOTENV_QUIET=true
      - COSMOS_DATABASE_NAME=${COSMOS_DATABASE_NAME}
      - MONGO_CONNECTION_STRING=mongodb://localhost:27017/cams-e2e?retrywrites=false
      - DATABASE_MOCK=${DATABASE_MOCK}
      - MSSQL_HOST=localhost
      - MSSQL_DATABASE=${MSSQL_DATABASE}
      - MSSQL_DATABASE_DXTR=${MSSQL_DATABASE_DXTR}
      - MSSQL_USER=${MSSQL_USER}
      - MSSQL_PASS=${MSSQL_PASS}
      - MSSQL_ENCRYPT=${MSSQL_ENCRYPT}
      - MSSQL_TRUST_UNSIGNED_CERT=${MSSQL_TRUST_UNSIGNED_CERT}
      - MSSQL_REQUEST_TIMEOUT=${MSSQL_REQUEST_TIMEOUT}
      - SLOT_NAME=${SLOT_NAME}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7071/api/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Frontend UI service (Vite preview on port 3000)
  frontend:
    build:
      context: ../../
      dockerfile: test/e2e/Dockerfile.frontend
    container_name: cams-frontend-e2e
    ports:
      - "3000:3000"
    environment:
      - BROWSER=none
      - DOTENV_CONFIG_SILENT=true
      - DOTENV_QUIET=true
      - CAMS_PA11Y=false
      - CAMS_FEATURE_FLAGS_MODE=test
      - CAMS_LOGIN_PROVIDER=${CAMS_LOGIN_PROVIDER}
      - CAMS_LOGIN_PROVIDER_CONFIG=${CAMS_LOGIN_PROVIDER_CONFIG}
      - CAMS_SERVER_HOSTNAME=${CAMS_SERVER_HOSTNAME}
      - CAMS_SERVER_PORT=${CAMS_SERVER_PORT}
      - CAMS_SERVER_PROTOCOL=${CAMS_SERVER_PROTOCOL}
      - CAMS_BASE_PATH=${CAMS_BASE_PATH}
      - CAMS_APPLICATIONINSIGHTS_CONNECTION_STRING=
      - SLOT_NAME=${SLOT_NAME}
    depends_on:
      - backend
    healthcheck:
      disable: true

  # Playwright test runner
  playwright:
    build:
      context: ../../
      dockerfile: test/e2e/Dockerfile.playwright
    container_name: cams-playwright-e2e
    network_mode: host
    environment:
      - DOTENV_CONFIG_SILENT=true
      - DOTENV_QUIET=true
      - TARGET_HOST=http://localhost:3000
      - CAMS_LOGIN_PROVIDER=${CAMS_LOGIN_PROVIDER}
      - OKTA_USER_NAME=${OKTA_USER_NAME}
      - OKTA_PASSWORD=${OKTA_PASSWORD}
    depends_on:
      - frontend
      - backend
    volumes:
      - ./test-results:/app/test/e2e/test-results
      - ./playwright-report:/app/test/e2e/playwright-report
    command: ["npm", "run", "headless"]
    working_dir: /app/test/e2e
