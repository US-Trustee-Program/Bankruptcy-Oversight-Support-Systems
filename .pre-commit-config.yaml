ci:
  skip: [eslint] # Requires node_modules; ESLint is enforced by the lint job in GitHub Actions CI

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: '^.*/package-lock.json$'
      - id: check-yaml
      - id: check-added-large-files
        exclude: '^backend/lib/adapters/gateways/ats/cleansing/test-data/.*\.tsv$'
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npx eslint --quiet
        language: system
        files: \.[jt]sx?$ # *.js, *.jsx, *.ts and *.tsx
        types: [file]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package.lock.json
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.4
    hooks:
      - id: check-github-workflows
        args: ['--verbose']
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ['-x']
  - repo: local
    hooks:
      - id: update-workflow-diagrams
        name: Update workflow diagrams
        entry: .pre-commit-hooks/update-workflow-diagrams.py
        language: python
        files: '^\.github/workflows/.*\.(yml|yaml)$'
        verbose: true
        additional_dependencies: ['PyYAML']
      - id: check-kv-secret-parity
        name: Check Key Vault secret/runbook parity
        entry: .pre-commit-hooks/check-kv-secret-parity.sh
        language: script
        files: '^(ops/scripts/utility/federated-credentials/setup-.*-federated-credential\.sh|\.github/workflows/.*\.ya?ml)$'
        pass_filenames: false
        verbose: true
